<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bill Details - GarageNearMe</title>
  <link rel="stylesheet" href="../css/bootstrap.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
  <style>
    body {
      background-color: #f8f9fa;
    }
    .bill-card {
      border-top: none;
    }
    .dotted-divider {
      border-top: 2px dashed #dee2e6;
      margin: 1.5rem 0;
    }
    @media print {
      body {
        background: white;
      }
      .btn, .back-btn-container {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <!-- Back Button -->
        <div class="back-btn-container mb-4">
          <a href="my-bookings.html" class="btn btn-light rounded-pill shadow-sm border fw-bold text-dark d-inline-flex align-items-center gap-2">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to My Bookings
          </a>
        </div>

        <!-- Bill Card -->
        <div class="bg-white rounded-4 shadow overflow-hidden bill-card" id="billCard" style="display: none;">

          <!-- ── Dark Branded Header ── -->
          <div class="p-4 p-md-5" style="background: var(--color-primary);">
            <div class="d-flex justify-content-between align-items-start gap-3">

              <!-- Left: Brand mark + Title + Badge -->
              <div>
                <div class="d-flex align-items-center gap-2 mb-3">
                  <div class="rounded-2 d-flex align-items-center justify-content-center flex-shrink-0"
                    style="background: var(--color-accent); width: 28px; height: 28px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="white">
                      <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/>
                    </svg>
                  </div>
                  <span class="fw-bold" style="font-family: var(--font-head); color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase;">GarageNearMe</span>
                </div>
                <h2 class="fw-bold text-white mb-2" style="font-family: var(--font-head);">Invoice</h2>
                <span class="badge rounded-pill px-3 py-1 d-inline-block"
                  style="background: var(--color-accent); font-size: 12px;" id="billNumber">Bill: #---</span>
                <div class="mt-2" style="color: rgba(255,255,255,0.45); font-size: 13px;" id="billDate">Date: ---</div>
              </div>

              <!-- Right: Garage Info -->
              <div class="text-end">
                <h5 class="fw-bold text-white mb-1" id="garageName" style="font-family: var(--font-head);">---</h5>
                <div style="color: rgba(255,255,255,0.5); font-size: 13px;" id="garageAddress">---</div>
                <div class="fw-bold mt-1 d-none" style="color: var(--color-accent); font-size: 13px;" id="garageGst">GST: ---</div>
              </div>

            </div>
          </div>

          <!-- ── Card Body ── -->
          <div class="p-4 p-md-5">

            <!-- Customer Info -->
            <div class="mb-4 p-3 rounded-3"
              style="background: rgba(27,31,46,0.04); border-left: 3px solid var(--color-accent);">
              <div class="fw-bold text-uppercase mb-2"
                style="font-size: 10px; letter-spacing: 1.5px; color: var(--color-text-muted);">Bill To</div>
              <h6 class="fw-bold mb-1" id="customerName" style="font-size: 15px;">---</h6>
              <div class="text-muted small" id="vehicleInfo">---</div>
              <div class="text-muted small mt-1" id="serviceType">Service: ---</div>
            </div>

            <!-- Items Table -->
            <div class="table-responsive mb-2">
              <table class="table table-hover table-borderless mb-0 align-middle">
                <thead>
                  <tr class="border-bottom">
                    <th scope="col" class="ps-0 fw-semibold pb-3 text-uppercase"
                      style="font-size: 11px; letter-spacing: 0.8px; color: var(--color-text-muted);">Description</th>
                    <th scope="col" class="fw-semibold pb-3 text-center text-uppercase"
                      style="font-size: 11px; letter-spacing: 0.8px; color: var(--color-text-muted);">Qty</th>
                    <th scope="col" class="pe-0 fw-semibold pb-3 text-end text-uppercase"
                      style="font-size: 11px; letter-spacing: 0.8px; color: var(--color-text-muted);">Amount</th>
                  </tr>
                </thead>
                <tbody id="billItemsBody">
                  <!-- Dynamically populated -->
                </tbody>
              </table>
            </div>

            <div class="dotted-divider"></div>

            <!-- Totals — full width -->
            <div class="mb-4" id="billTotalsBox">
              <!-- Dynamically populated -->
            </div>

            <!-- Print & Download Actions -->
            <div class="d-flex flex-column flex-sm-row gap-3 mt-1">
              <button onclick="window.print()" class="btn btn-outline-primary flex-grow-1 fw-bold rounded-pill py-3 d-flex justify-content-center align-items-center gap-2">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v3h12V3z"/></svg>
                Print Bill
              </button>
            </div>

          </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
          <div class="spinner-border" style="color: var(--color-primary);" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-3 fw-medium" style="color: var(--color-text-muted);">Loading bill details...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="text-center py-5" style="display: none;">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="var(--color-text-muted)" class="mb-3">
            <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
          </svg>
          <h5 class="mt-3 fw-bold text-dark" id="errorMessage">Unable to load bill</h5>
          <p class="text-muted">The bill for this booking may not exist yet.</p>
        </div>

      </div>
    </div>
  </div>

  <script src="../js/mechanic-auth.js"></script>
  <script src="../js/bootstrap.js"></script>
  <script>
    // Get booking ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('id');

    const API_BASE = "http://127.0.0.1:8000";
    const token = localStorage.getItem('gnm_token');

    let currentBill = null;

    function authHeaders() {
        return { 'Authorization': `Bearer ${token}` };
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (!bookingId) {
            showError('No Booking ID provided');
            return;
        }

        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        try {
            // Fetch Bill
            const res = await fetch(`${API_BASE}/api/bookings/${bookingId}/bill`, {
                headers: authHeaders()
            });

            if (!res.ok) {
                if (res.status === 404) {
                    showError('Bill not found. Payment may not have been marked as paid yet.');
                } else {
                    showError('Failed to load bill details');
                }
                return;
            }

            currentBill = await res.json();
            renderBill();
        } catch (err) {
            console.error(err);
            showError(err.message || 'Error loading bill');
        }
    });

    function showError(message) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorMessage').textContent = message;
    }

    function renderBill() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('billCard').style.display = 'block';

        // Header
        document.getElementById('billNumber').textContent = `Bill: ${currentBill.bill_number || '#' + currentBill.id}`;
        const date = new Date(currentBill.bill_date);
        document.getElementById('billDate').textContent = `Date: ${date.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}`;

        // Garage Info
        document.getElementById('garageName').textContent = currentBill.garage_name || 'Garage';
        document.getElementById('garageAddress').textContent = currentBill.garage_address || 'Address not available';
        
        if (currentBill.garage_gst) {
            const gstEl = document.getElementById('garageGst');
            gstEl.textContent = `GST: ${currentBill.garage_gst}`;
            gstEl.classList.remove('d-none');
        }

        // Customer Info
        document.getElementById('customerName').textContent = currentBill.customer_name || 'Customer';
        document.getElementById('vehicleInfo').textContent = currentBill.vehicle_info || 'Vehicle details not available';
        document.getElementById('serviceType').textContent = `Service: ${currentBill.service_type || 'General'}`;

        // Items Table
        let itemsHtml = '';
        if (currentBill.items && currentBill.items.length > 0) {
            currentBill.items.forEach(item => {
                const price = item.price || 0;
                const qty = item.qty || 1;
                itemsHtml += `
                    <tr>
                      <td class="ps-0 py-3">
                        <div class="fw-semibold text-dark" style="font-size: 14px;">${item.item_name || 'Item'}</div>
                      </td>
                      <td class="py-3 text-center">
                        <span class="badge rounded-pill bg-light border text-secondary" style="font-size: 12px; padding: 5px 12px;">${qty}</span>
                      </td>
                      <td class="pe-0 py-3 text-end">
                        <span class="fw-bold" style="font-size: 15px; color: var(--color-primary);">₹${parseFloat(price).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                      </td>
                    </tr>
                `;
            });
        } else {
            itemsHtml = '<tr><td colspan="3" class="text-center text-muted py-3">No items found</td></tr>';
        }
        document.getElementById('billItemsBody').innerHTML = itemsHtml;

        // Totals
        const totalAmount = currentBill.total_amount || 0;
        const subtotal = currentBill.subtotal || 0;
        const taxAmount = currentBill.tax_amount || 0;

        let totalsHtml = '';
        if (taxAmount > 0) {
            totalsHtml = `
              <div class="d-flex justify-content-between align-items-center py-2" style="font-size: 14px;">
                <span class="text-muted">Subtotal</span>
                <span class="fw-bold text-dark">₹${parseFloat(subtotal).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
              </div>
              <div class="d-flex justify-content-between align-items-center py-2 mb-3" style="font-size: 14px; border-bottom: 1px dashed #dee2e6;">
                <span class="text-muted">Taxes (GST)</span>
                <span class="fw-bold text-dark">₹${parseFloat(taxAmount).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
              </div>
            `;
        } else {
            totalsHtml = `
              <div class="d-flex justify-content-between align-items-center py-2 mb-3" style="font-size: 14px; border-bottom: 1px dashed #dee2e6;">
                <span class="text-muted">Subtotal</span>
                <span class="fw-bold text-dark">₹${parseFloat(totalAmount).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
              </div>
            `;
        }

        totalsHtml += `
          <div class="d-flex justify-content-between align-items-center rounded-3 p-4" style="background: var(--color-primary);">
            <span class="fw-bold text-white" style="font-size: 16px;">Total Amount</span>
            <span class="fw-bold text-white" style="font-size: 28px; font-family: var(--font-head);">₹${parseFloat(totalAmount).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
          </div>
        `;

        document.getElementById('billTotalsBox').innerHTML = totalsHtml;
    }
  </script>
</body>

</html>

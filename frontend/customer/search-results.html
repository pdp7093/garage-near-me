<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results — GarageNearMe</title>

    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/style.css" />

    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
</head>

<body style="background:var(--color-bg); min-height:100vh;">

    <!-- NAVBAR -->
    <div id="navbar-container"></div>


    <!-- ═════════ SEARCH BAR ═════════ -->
    <div id="search-filter-bar" class="bg-white border-bottom py-3 shadow-sm">

        <div class="container-fluid px-4">

            <div class="row align-items-center">

                <!-- SEARCH -->
                <div class="col-12 col-lg-5 mb-3 mb-lg-0">

                    <div class="d-flex align-items-center bg-light border rounded-pill px-3 py-2">

                        <svg viewBox="0 0 24 24" fill="#9CA3AF" width="18" height="18" class="me-2 flex-shrink-0">

                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />

                        </svg>

                        <input type="text" class="form-control border-0 bg-transparent shadow-none p-0 me-3"
                            value="Connaught Place, New Delhi" style="font-size:14px;">

                        <div style="width:1px; height:20px; background:var(--color-border);" class="me-3">
                        </div>

                        <input type="text" class="form-control border-0 bg-transparent shadow-none p-0"
                            placeholder="Service (e.g. AC Repair)" style="font-size:14px;">

                        <button class="btn btn-sm rounded-pill px-3 text-white ms-2"
                            style="background:var(--color-primary);">
                            Search
                        </button>

                    </div>

                </div>


                <!-- FILTERS -->
                <div class="col-12 col-lg-7 d-flex align-items-center gap-2 flex-wrap">

                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                        Filters
                    </button>

                    <button class="btn btn-sm rounded-pill px-3 text-white" style="background:var(--color-primary);">
                        Top Rated
                    </button>

                    <button class="btn bg-white border btn-sm rounded-pill px-3 text-muted">
                        Nearest
                    </button>

                    <button class="btn bg-white border btn-sm rounded-pill px-3 text-muted">
                        Open Now
                    </button>

                    <button class="btn bg-white border btn-sm rounded-pill px-3 text-muted">
                        Car Wash
                    </button>

                    <button class="btn bg-white border btn-sm rounded-pill px-3 text-muted">
                        Mechanic
                    </button>

                </div>

            </div>

        </div>

    </div>



    <!-- ═════════ MAIN CONTENT ═════════ -->
    <div class="container-fluid px-0">

        <div class="row g-0">

            <div class="col-12 p-3 p-md-4" id="garage-list-col">

                <h4 class="fw-bold mb-4" style="font-family:var(--font-head);">
                    12 Garages found near you
                </h4>

                <!-- ═════════ GARAGE CONTAINER ═════════ -->
                <div id="garage-container">
                    <!-- Cards will be dynamically inserted here -->
                </div>


            </div>

        </div>

    </div>




    <!-- ═════════ PAGINATION ═════════ -->
    <div class="container mt-4 mb-5">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">

            <!-- INFO -->
            <div id="pagination-info" class="text-muted" style="font-size:14px;">
            </div>

            <!-- BUTTONS -->
            <nav>

                <ul id="pagination" class="pagination mb-0 align-items-center gap-2">
                </ul>

            </nav>

        </div>

    </div>




    <!-- FOOTER -->
    <div id="footer-container"></div>




    <!-- COMPONENTS -->
    <script src="../js/components.js"></script>

    <script>

        Promise.all([
            loadComponent('navbar-container', 'components/navbar.html', () => {
                setActiveSidebarLink();
                initCustomerMenu();
            }),
            loadComponent('footer-container', 'components/footer.html')
        ]);

    </script>


    <!-- ═════════ DYNAMIC PAGINATION & NEARBY GARAGES ═════════ -->
    <script>

        const API_BASE = "http://localhost:8000";
        const itemsPerPage = 10;
        let allGarages = [];
        let currentPage = 1;

        const pagination = document.getElementById('pagination');
        const paginationInfo = document.getElementById('pagination-info');
        const garageContainer = document.getElementById('garage-container');


        // FETCH NEARBY GARAGES
        async function fetchNearbyGarages() {
            try {
                // Get user location
                if (!navigator.geolocation) {
                    console.error('Geolocation not supported, using default coordinates');
                    fetchWithCoordinates(28.6139, 77.2090); // Delhi default
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        console.log('User location:', lat, lng);
                        fetchWithCoordinates(lat, lng);
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        // Fallback to Delhi coordinates
                        console.log('Using fallback coordinates (Delhi)');
                        fetchWithCoordinates(28.6139, 77.2090);
                    },
                    { timeout: 10000 }
                );

            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function fetchWithCoordinates(lat, lng) {
            try {
                console.log(`Fetching garages for lat=${lat}, lng=${lng}, radius=2.0`);
                
                const url = `${API_BASE}/api/garage/nearby?lat=${lat}&lng=${lng}&radius=2.0`;
                console.log('API URL:', url);

                const response = await fetch(url);

                if (!response.ok) {
                    console.error('API Error:', response.status, response.statusText);
                    const errorText = await response.text();
                    console.error('Error body:', errorText);
                    throw new Error(`HTTP ${response.status}`);
                }

                allGarages = await response.json();
                console.log('Garages fetched:', allGarages);
                
                if (allGarages.length === 0) {
                    console.warn('No garages found nearby');
                }
                
                showPage(1);
            } catch (error) {
                console.error('Error fetching garages:', error);
                paginationInfo.innerHTML = `<span class="text-danger">Error loading garages: ${error.message}</span>`;
            }
        }


        // CREATE GARAGE CARD HTML
        function createGarageCard(garage) {
            const statusClass = garage.is_open_now ? 'text-success' : 'text-danger';
            const statusText = garage.is_open_now ? 'Open' : 'Closed';
            const services = garage.services.slice(0, 3).map(s => `<span class="badge bg-light text-dark border">${s.service_name}</span>`).join('');
            const rating = (Math.random() * 1 + 4).toFixed(1);
            
            return `
                <div class="garage-item card border mb-4 rounded-4 shadow-sm overflow-hidden"
                    style="cursor:pointer;" onclick="window.location.href='garage-details.html?id=${garage.id}'">

                    <div class="row g-0">

                        <!-- IMAGE -->
                        <div class="col-4">
                            <div class="w-100 h-100" style="min-height:170px; background-image:url('${garage.logo_url || 'https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=400'}');
                                    background-size:cover; background-position:center;">
                            </div>
                        </div>

                        <!-- CONTENT -->
                        <div class="col-8 d-flex flex-column">
                            <div class="card-body p-4 d-flex flex-column h-100">

                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="fw-bold mb-0" style="font-family:var(--font-head);">
                                        ${garage.name}
                                    </h5>
                                    <span class="badge bg-success rounded-pill px-3 py-2">
                                        ★ ${rating}
                                    </span>
                                </div>

                                <p class="text-muted mb-3" style="font-size:14px;">
                                    <span class="fw-semibold text-dark">
                                        ${garage.distance_km} km
                                    </span>
                                    • ${garage.location.street}, ${garage.location.city}
                                </p>

                                <div class="d-flex flex-wrap gap-2 mb-3">
                                    ${services || '<span class="badge bg-light text-dark border">Services</span>'}
                                </div>

                                <div class="mt-auto d-flex justify-content-between align-items-center">
                                    <div style="font-size:13px;">
                                        <span class="${statusClass} fw-bold">
                                            ${statusText}
                                        </span>
                                        <span class="text-muted">
                                            • ${garage.todays_hours?.close_time || 'N/A'}
                                        </span>
                                    </div>

                                    <button class="btn btn-sm rounded-pill text-white px-3"
                                        style="background:var(--color-primary);">
                                        Book Now
                                    </button>
                                </div>

                            </div>
                        </div>

                    </div>

                </div>
            `;
        }


        // SHOW PAGE WITH PAGINATION
        function showPage(page) {
            currentPage = page;

            // Clear container
            garageContainer.innerHTML = '';

            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageGarages = allGarages.slice(start, end);

            // Render garage cards
            pageGarages.forEach(garage => {
                garageContainer.innerHTML += createGarageCard(garage);
            });

            updatePagination();
        }


        // UPDATE PAGINATION CONTROLS
        function updatePagination() {
            pagination.innerHTML = '';

            const totalPages = Math.ceil(allGarages.length / itemsPerPage);
            
            if (totalPages === 0) {
                paginationInfo.innerHTML = `<span class="text-muted">No garages found nearby</span>`;
                return;
            }

            // INFO
            const startItem = ((currentPage - 1) * itemsPerPage) + 1;
            const endItem = Math.min(currentPage * itemsPerPage, allGarages.length);

            paginationInfo.innerHTML = `
                Showing
                <span class="fw-semibold text-dark">
                    ${startItem}-${endItem}
                </span>
                of
                <span class="fw-semibold text-dark">
                    ${allGarages.length}
                </span>
                garages
            `;

            // PREV
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `
                <a class="page-link rounded-pill border shadow-sm px-3" href="#">
                    ← Prev
                </a>
            `;
            prevLi.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentPage > 1) showPage(currentPage - 1);
            });
            pagination.appendChild(prevLi);

            // PAGE NUMBERS
            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === currentPage ? 'active' : ''}`;
                li.innerHTML = `
                    <a class="page-link rounded-circle border shadow-sm
                        d-flex align-items-center justify-content-center"
                        href="#"
                        style="width:42px; height:42px;">
                        ${i}
                    </a>
                `;
                li.addEventListener('click', (e) => {
                    e.preventDefault();
                    showPage(i);
                });
                pagination.appendChild(li);
            }

            // NEXT
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
            nextLi.innerHTML = `
                <a class="page-link rounded-pill border shadow-sm px-3" href="#">
                    Next →
                </a>
            `;
            nextLi.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentPage < totalPages) showPage(currentPage + 1);
            });
            pagination.appendChild(nextLi);
        }

        // LOAD ON PAGE READY
        document.addEventListener('DOMContentLoaded', fetchNearbyGarages);

    </script>



    <script src="../js/bootstrap.js"></script>
    <script src="../js/script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results — GarageNearMe</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#DC2626">
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        #search-filter-bar {

            top: 65px;
            z-index: 1020;
            border-bottom: 1px solid var(--color-border);
        }

        #list-panel {
            overflow: visible;
            height: auto;
        }

        #map-panel {


            top: 140px;
            height: calc(100vh - 140px);
            border-left: 1px solid var(--color-border);


        }

        #map {
            width: 100%;
            height: 100%;
        }

        #mobile-map-panel {
            display: none;
            height: 280px;
        }

        #mobile-map {
            width: 100%;
            height: 100%;
        }

        .garage-item {
            cursor: pointer;
            transition: box-shadow .2s, transform .15s;
        }

        .garage-item:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, .1) !important;
            transform: translateY(-2px);
        }

        .filter-chip {
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            font-size: 13px;
        }

        .filter-chip.active {
            background: var(--color-primary) !important;
            color: white !important;
            border-color: var(--color-primary) !important;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .popup-btn {
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--color-text-muted);
            text-align: center;
        }
    </style>
</head>

<body style="background:var(--color-bg); min-height:100vh;">

    <div id="navbar-container"></div>

    <!-- ═══ SEARCH & FILTER BAR ═══ -->
    <div id="search-filter-bar" class="bg-white border-bottom py-3 shadow-sm">
        <div class="container-fluid px-4">
            <div class="row align-items-center">

                <!-- Search inputs -->
                <div class="col-12 col-lg-5 mb-3 mb-lg-0">
                    <div class="d-flex align-items-center bg-light border rounded-pill px-3 py-2">
                        <svg viewBox="0 0 24 24" fill="#9CA3AF" width="18" height="18" class="me-2 flex-shrink-0">
                            <path
                                d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                        </svg>
                        <input type="text" id="location-display"
                            class="form-control border-0 bg-transparent shadow-none p-0 me-3"
                            placeholder="Enter area or city..." style="font-size:14px;">
                        <div style="width:1px;height:20px;background:var(--color-border);" class="me-3"></div>
                        <input type="text" id="service-input"
                            class="form-control border-0 bg-transparent shadow-none p-0"
                            placeholder="Service (e.g. AC Repair)" style="font-size:14px;">
                        <button class="btn btn-sm rounded-pill px-3 text-white ms-2 flex-shrink-0"
                            style="background:var(--color-primary);font-size:13px;" onclick="onSearch()">
                            Search
                        </button>
                    </div>
                </div>

                <!-- Filter chips -->
                <div class="col-12 col-lg-7 d-flex align-items-center gap-2 overflow-auto pb-1"
                    style="scrollbar-width:none;">
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1 active"
                        id="chip-nearest" onclick="setSort('nearest',this)">Nearest</button>
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1" id="chip-open"
                        onclick="toggleChip('open')">Open Now</button>
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1" id="chip-pick"
                        onclick="toggleChip('pick')">🚗 Pick &amp; Drop</button>
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1" id="chip-sos"
                        onclick="toggleChip('sos')">🆘 SOS Available</button>
                    <select id="radius-select" class="form-select form-select-sm rounded-pill border px-3"
                        style="font-size:13px;width:auto;cursor:pointer;" onchange="changeRadius(this.value)">
                        <option value="2">Within 2 km</option>
                        <option value="5">Within 5 km</option>
                        <option value="10">Within 10 km</option>
                        <option value="20">Within 20 km</option>
                    </select>
                </div>

            </div>
        </div>
    </div>

    <!-- ═══ MAIN LAYOUT ═══ -->
    <div class="container-fluid px-0 mb-5">
        <div class="row g-0">

            <!-- LEFT: LIST -->
            <div class="col-12 col-lg-7 p-3 p-md-4" id="list-panel" style="overflow:visible;">

                <!-- Mobile map toggle -->
                <div class="d-lg-none mb-3">
                    <button class="btn btn-outline-secondary w-100 rounded-pill py-2" style="font-size:13px;"
                        onclick="toggleMobileMap()">
                        🗺️ <span id="map-btn-text">Show Map</span>
                    </button>
                </div>

                <!-- Mobile map -->
                <div id="mobile-map-panel" class="rounded-4 overflow-hidden mb-3 border">
                    <div id="mobile-map"></div>
                </div>

                <!-- Result count -->
                <h4 class="fw-bold mb-4" id="result-count" style="font-family:var(--font-head); width: 100%;">
                    Finding garages near you...
                </h4>

                <!-- Cards -->
                <div id="garage-container"></div>

                <!-- Pagination -->
                <div class="container mt-4 mb-5">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                        <div id="pagination-info" class="text-muted" style="font-size:14px;"></div>
                        <nav>
                            <ul id="pagination" class="pagination mb-0 align-items-center gap-2"></ul>
                        </nav>
                    </div>
                </div>

            </div>

            <!-- RIGHT: MAP (Desktop) -->
            <div class="col-lg-5 d-none d-lg-block pt-4" id="map-panel">
                <div id="map"></div>
            </div>

        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/components.js"></script>
    <script>
        Promise.all([
            loadComponent('navbar-container', 'components/navbar.html', () => {
                setActiveSidebarLink();
                initCustomerMenu();
            }),
            loadComponent('footer-container', 'components/footer.html')
        ]);
    </script>

    <script src="/js/config.js"></script>
    <script>
        const ITEMS_PER_PAGE = 10;

        let allGarages = [];
        let filtered = [];
        let currentPage = 1;
        let userLat = null;
        let userLng = null;
        let desktopMap = null;
        let mobileMap = null;
        let deskMarkers = [];
        let mobMarkers = [];
        let mobileMapOpen = false;

        // filter state
        let fOpen = false, fPick = false, fSOS = false;
        let serviceQuery = '';
        let searchRadius = 2.0;

        // ── Boot ──
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(location.search);

            // Service from URL or index search
            if (params.get('service')) {
                document.getElementById('service-input').value = params.get('service');
                serviceQuery = params.get('service');
            }

            document.getElementById('service-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') onSearch();
            });

            // Location input: re-search on Enter
            document.getElementById('location-display').addEventListener('keydown', e => {
                if (e.key === 'Enter') geocodeAndFetch(document.getElementById('location-display').value.trim());
            });

            // GPS coords from index page search
            const urlLat = parseFloat(params.get('lat'));
            const urlLng = parseFloat(params.get('lng'));
            const urlLoc = params.get('location') || '';

            if (!isNaN(urlLat) && !isNaN(urlLng)) {
                // Came from index with GPS detected
                userLat = urlLat;
                userLng = urlLng;
                document.getElementById('location-display').value = urlLoc || 'Your Location';
                initDesktopMap();
                fetchWithCoordinates(userLat, userLng);
            } else if (urlLoc) {
                // Came from index with text location
                document.getElementById('location-display').value = urlLoc;
                geocodeAndFetch(urlLoc);
            } else {
                // Fresh visit — try GPS
                getLocation();
            }
        });

        // ── Geocode text → lat/lng using Nominatim ──
        async function geocodeAndFetch(locationText) {
            if (!locationText) { getLocation(); return; }
            showSkeletons();
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationText)}&format=json&limit=1&countrycodes=in`
                );
                const data = await res.json();
                if (data && data.length > 0) {
                    userLat = parseFloat(data[0].lat);
                    userLng = parseFloat(data[0].lon);
                    document.getElementById('location-display').value = data[0].display_name.split(',').slice(0, 2).join(',').trim();
                    initDesktopMap();
                    fetchWithCoordinates(userLat, userLng);
                } else {
                    fallback();
                }
            } catch (_) {
                fallback();
            }
        }

        // ── GPS Location ──
        function getLocation() {
            showSkeletons();
            if (!navigator.geolocation) { showLocationPrompt(); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    document.getElementById('location-display').value = 'Your Location';
                    // Reverse geocode for display
                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`)
                        .then(r => r.json())
                        .then(d => {
                            const area = d.address?.suburb || d.address?.city_district || d.address?.city || 'Your Location';
                            document.getElementById('location-display').value = area;
                        })
                        .catch(() => {});
                    initDesktopMap();
                    fetchWithCoordinates(userLat, userLng);
                },
                () => showLocationPrompt(),
                { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
            );
        }

        function showLocationPrompt() {
            document.getElementById('result-count').textContent = '';
            document.getElementById('garage-container').innerHTML = `
                <div class="text-center py-5">
                    <svg viewBox="0 0 24 24" fill="#9CA3AF" width="56" height="56" class="mb-3">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <h5 class="fw-bold mb-2" style="color:var(--color-text);">Location detect nahi hua</h5>
                    <p class="text-muted mb-4" style="font-size:14px;">Browser mein location permission allow karein, ya search bar mein apna area type karein.</p>
                    <div class="d-flex gap-2 justify-content-center flex-wrap">
                        <button class="btn rounded-pill px-4 text-white fw-bold" style="background:var(--color-primary);" onclick="getLocation()">
                            📍 Dobara Try Karein
                        </button>
                        <button class="btn btn-outline-secondary rounded-pill px-4 fw-bold" onclick="fallback()">
                            🏙️ Ahmedabad Use Karein
                        </button>
                    </div>
                </div>`;
            document.getElementById('pagination-info').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        function fallback() {
            userLat = 23.0225; userLng = 72.5714;
            document.getElementById('location-display').value = 'Ahmedabad';
            initDesktopMap();
            fetchWithCoordinates(userLat, userLng);
        }

        // ── Radius change ──
        function changeRadius(val) {
            searchRadius = parseFloat(val);
            fetchWithCoordinates(userLat ?? 23.0225, userLng ?? 72.5714);
        }

        // ── Fetch ──
        async function fetchWithCoordinates(lat, lng) {
            showSkeletons();
            try {
                let url = `${getApiBase()}/garage/nearby?lat=${lat}&lng=${lng}&radius=${searchRadius}`;
                if (serviceQuery) url += `&service_name=${encodeURIComponent(serviceQuery)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allGarages = await res.json();
                applyFilters();
            } catch (e) {
                showError(e.message);
            }
        }

        function onSearch() {
            serviceQuery = document.getElementById('service-input').value.trim();
            const locText = document.getElementById('location-display').value.trim();
            // If location text doesn't match current coords (user typed something new), geocode it
            if (locText && locText !== 'Your Location' && locText !== 'Ahmedabad (approx.)' && userLat === null) {
                geocodeAndFetch(locText);
            } else {
                fetchWithCoordinates(userLat ?? 23.0225, userLng ?? 72.5714);
            }
        }

        // ── Filters ──
        function setSort(mode, btn) {
            document.getElementById('chip-nearest').classList.toggle('active', mode === 'nearest');
            applyFilters();
        }

        function toggleChip(type) {
            if (type === 'open') fOpen = !fOpen;
            if (type === 'pick') fPick = !fPick;
            if (type === 'sos') fSOS = !fSOS;
            document.getElementById('chip-open').classList.toggle('active', fOpen);
            document.getElementById('chip-pick').classList.toggle('active', fPick);
            document.getElementById('chip-sos').classList.toggle('active', fSOS);
            applyFilters();
        }

        function applyFilters() {
            let data = [...allGarages];
            if (fOpen) data = data.filter(g => g.is_open_now);
            if (fPick) data = data.filter(g => g.offers_pick_and_drop);
            if (fSOS) data = data.filter(g => g.is_sos_available);
            data.sort((a, b) => a.distance_km - b.distance_km);
            filtered = data;
            currentPage = 1;
            showPage(1);
            updateMapMarkers();
        }

        // ── Render ──
        function showPage(page) {
            currentPage = page;
            const container = document.getElementById('garage-container');
            const countEl = document.getElementById('result-count');

            if (filtered.length === 0) {
                countEl.textContent = '0 Garages found near you';
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="var(--color-border)" width="64" height="64" class="mb-3">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        <h5 class="fw-bold mb-2" style="color:var(--color-text);">No garages found</h5>
                        <p style="font-size:14px;">No garages found within a 2km radius.<br>Try changing your filters.</p>
                    </div>`;
                document.getElementById('pagination-info').textContent = '';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            countEl.textContent = `${filtered.length} Garage${filtered.length !== 1 ? 's' : ''} found near you`;

            const start = (page - 1) * ITEMS_PER_PAGE;
            const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);
            container.innerHTML = pageData.map(g => createGarageCard(g)).join('');
            updatePagination();
        }

        function createGarageCard(g) {
            const street = g.location?.street || '';
            const city = g.location?.city || 'Ahmedabad';
            const address = street ? `${street}, ${city}` : city;
            const services = (g.services || []).slice(0, 3)
                .map(s => `<span class="badge bg-light text-dark border">${s.service_name}</span>`).join('');
            const img = g.logo_url || 'https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=400';

            return `
            <div class="garage-item card border mb-4 rounded-4 shadow-sm overflow-hidden"
                 id="card-${g.id}"
                 onclick="window.location.href='garage-details/${g.slug || g.id}'"
                 onmouseenter="hoverMarker(${g.id})"
                 onmouseleave="unhoverMarker()">
                <div class="row g-0">
                    <div class="col-4">
                        <div class="w-100 h-100" style="min-height:170px;background-image:url('${img}');background-size:cover;background-position:center;${g.is_open_now ? '' : 'filter:grayscale(50%);'}"></div>
                    </div>
                    <div class="col-8 d-flex flex-column">
                        <div class="card-body p-4 d-flex flex-column h-100">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold mb-0 text-truncate me-2" style="font-family:var(--font-head);">${g.name}</h5>
                                ${g.is_verified ? `<span class="badge bg-success rounded-pill px-2 py-1 flex-shrink-0" style="font-size:11px;">✓</span>` : ''}
                            </div>
                            <p class="text-muted mb-3" style="font-size:14px;">
                                <span class="fw-semibold text-dark">${g.distance_km} km</span> • ${address}
                            </p>
                            <div class="d-flex flex-wrap gap-2 mb-3">
                                ${services || '<span class="badge bg-light text-dark border">General Service</span>'}
                                ${g.offers_pick_and_drop ? '<span class="badge bg-light text-dark border">🚗 Pick &amp; Drop</span>' : ''}
                            </div>
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <div style="font-size:13px;">
                                    <span class="${g.is_open_now ? 'text-success' : 'text-danger'} fw-bold">${g.is_open_now ? 'Open' : 'Closed'}</span>
                                </div>
                                <button class="btn btn-sm rounded-pill text-white px-3" style="background:var(--color-primary);"
                                    onclick="event.stopPropagation();window.location.href='garage-details/${g.slug || g.id}'">
                                    Book Now
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // ── Pagination ──
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const paginationInfo = document.getElementById('pagination-info');
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                paginationInfo.innerHTML = '';
                return;
            }

            const startItem = ((currentPage - 1) * ITEMS_PER_PAGE) + 1;
            const endItem = Math.min(currentPage * ITEMS_PER_PAGE, filtered.length);
            paginationInfo.innerHTML = `Showing <b>${startItem}-${endItem}</b> of <b>${filtered.length}</b> garages`;

            let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link rounded-pill border shadow-sm px-3" href="#" onclick="gotoPage(event,${currentPage - 1})">← Prev</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link rounded-circle border shadow-sm d-flex align-items-center justify-content-center"
                       href="#" style="width:42px;height:42px;" onclick="gotoPage(event,${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link rounded-pill border shadow-sm px-3" href="#" onclick="gotoPage(event,${currentPage + 1})">Next →</a></li>`;
            pagination.innerHTML = html;
        }

        function gotoPage(e, page) {
            e.preventDefault();
            const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            if (page < 1 || page > total) return;
            showPage(page);
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        // ── Leaflet Map ──
        function initDesktopMap() {
            if (desktopMap) return;
            desktopMap = L.map('map').setView([userLat, userLng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(desktopMap);
            L.circleMarker([userLat, userLng], { radius: 10, fillColor: '#FF6B35', color: 'white', weight: 3, fillOpacity: 1 })
                .addTo(desktopMap).bindPopup('<b>You are here</b>');
            L.circle([userLat, userLng], { radius: 2000, color: '#1B1F2E', fillColor: '#1B1F2E', fillOpacity: .04, weight: 1.5, dashArray: '6,4' })
                .addTo(desktopMap);
        }

        function initMobileMap() {
            if (mobileMap) return;
            mobileMap = L.map('mobile-map').setView([userLat, userLng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(mobileMap);
            L.circleMarker([userLat, userLng], { radius: 10, fillColor: '#FF6B35', color: 'white', weight: 3, fillOpacity: 1 })
                .addTo(mobileMap).bindPopup('<b>You are here</b>');
        }

        function markerIcon(isOpen) {
            const bg = isOpen ? '#1B1F2E' : '#9CA3AF';
            return L.divIcon({
                className: '',
                html: `<div style="background:${bg};color:white;border-radius:50% 50% 50% 0;width:32px;height:32px;
                            display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
                            transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.3);">
                           <span style="transform:rotate(45deg)">G</span></div>`,
                iconSize: [32, 32], iconAnchor: [16, 32]
            });
        }

        function updateMapMarkers() {
            deskMarkers.forEach(m => m.marker.remove());
            mobMarkers.forEach(m => m.marker.remove());
            deskMarkers = []; mobMarkers = [];

            filtered.forEach(g => {
                if (!g.location?.latitude || !g.location?.longitude) return;
                const popup = `<div style="min-width:150px;">
                    <div style="font-size:13px;font-weight:700;margin-bottom:3px;">${g.name}</div>
                    <div style="font-size:12px;color:#666;">${g.distance_km} km away</div>
                    <div style="font-size:12px;margin-bottom:6px;">${g.is_open_now ? '<span style="color:#22C55E;">● Open</span>' : '<span style="color:#E53E3E;">● Closed</span>'}</div>
                    <button class="popup-btn" onclick="window.location.href='garage-details/${g.slug || g.id}'">View Garage</button>
                </div>`;
                const icon = markerIcon(g.is_open_now);
                if (desktopMap) {
                    const m = L.marker([g.location.latitude, g.location.longitude], { icon }).addTo(desktopMap).bindPopup(popup);
                    deskMarkers.push({ id: g.id, marker: m });
                }
                if (mobileMap) {
                    const m = L.marker([g.location.latitude, g.location.longitude], { icon }).addTo(mobileMap).bindPopup(popup);
                    mobMarkers.push({ id: g.id, marker: m });
                }
            });

            if (desktopMap && deskMarkers.length > 0) {
                desktopMap.fitBounds(L.featureGroup(deskMarkers.map(m => m.marker)).getBounds().pad(.2));
            }
        }

        function hoverMarker(id) {
            const m = deskMarkers.find(m => m.id === id);
            if (m) m.marker.openPopup();
        }
        function unhoverMarker() {
            deskMarkers.forEach(m => m.marker.closePopup());
        }

        function toggleMobileMap() {
            const panel = document.getElementById('mobile-map-panel');
            const btn = document.getElementById('map-btn-text');
            mobileMapOpen = !mobileMapOpen;
            if (mobileMapOpen) {
                panel.style.display = 'block';
                btn.textContent = 'Hide Map';
                if (!mobileMap) { initMobileMap(); updateMapMarkers(); }
                setTimeout(() => mobileMap.invalidateSize(), 100);
            } else {
                panel.style.display = 'none';
                btn.textContent = 'Show Map';
            }
        }

        // ── Skeleton ──
        function showSkeletons() {
            document.getElementById('result-count').textContent = 'Finding garages near you...';
            document.getElementById('garage-container').innerHTML = [1, 2, 3].map(() => `
                <div class="card border mb-4 rounded-4 shadow-sm overflow-hidden">
                    <div class="row g-0">
                        <div class="col-4"><div class="skeleton w-100" style="min-height:170px;border-radius:0;"></div></div>
                        <div class="col-8 p-4">
                            <div class="skeleton mb-2" style="height:20px;width:60%;"></div>
                            <div class="skeleton mb-3" style="height:14px;width:45%;"></div>
                            <div class="d-flex gap-2 mb-3">
                                <div class="skeleton" style="height:22px;width:70px;border-radius:20px;"></div>
                                <div class="skeleton" style="height:22px;width:70px;border-radius:20px;"></div>
                            </div>
                            <div class="skeleton ms-auto" style="height:32px;width:90px;border-radius:20px;"></div>
                        </div>
                    </div>
                </div>`).join('');
            document.getElementById('pagination-info').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        // ── Error ──
        function showError(msg) {
            document.getElementById('result-count').textContent = '';
            document.getElementById('garage-container').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="var(--color-danger,#E53E3E)" width="48" height="48" class="mb-3">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <h5 class="fw-bold mb-2">Something went wrong</h5>
                    <p style="font-size:14px;">${msg}</p>
                    <button class="btn btn-sm rounded-pill px-4 text-white mt-2" style="background:var(--color-primary);"
                        onclick="fetchWithCoordinates(userLat,userLng)">Try Again</button>
                </div>`;
        }
    </script>

    <script src="/js/bootstrap.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>

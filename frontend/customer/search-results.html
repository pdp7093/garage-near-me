<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="google-site-verification" content="oo-PKXYE2tMvJTEH0tq6-_hivJePvxok7u9f9tqAp28" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results — GarageNearMe</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#DC2626">
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        #search-filter-bar {

            top: 65px;
            z-index: 1020;
            border-bottom: 1px solid var(--color-border);
        }

        #list-panel {
            overflow: visible;
            height: auto;
        }

        #map-panel {


            top: 140px;
            height: calc(100vh - 140px);
            border-left: 1px solid var(--color-border);


        }

        #map {
            width: 100%;
            height: 100%;
        }

        #mobile-map-panel {
            display: none;
            height: 280px;
        }

        #mobile-map {
            width: 100%;
            height: 100%;
        }

        .garage-item {
            cursor: pointer;
            transition: box-shadow .2s, transform .15s;
        }

        .garage-item:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, .1) !important;
            transform: translateY(-2px);
        }

        .filter-chip {
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            font-size: 13px;
        }

        .filter-chip.active {
            background: var(--color-primary) !important;
            color: white !important;
            border-color: var(--color-primary) !important;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .popup-btn {
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--color-text-muted);
            text-align: center;
        }
    </style>
</head>

<body style="background:var(--color-bg); min-height:100vh;">

    <div id="navbar-container"></div>

    <!-- ═══ SEARCH & FILTER BAR ═══ -->
    <div id="search-filter-bar" class="bg-white border-bottom py-3 shadow-sm">
        <div class="container-fluid px-4">
            <div class="row align-items-center">

                <!-- Search inputs -->
                <div class="col-12 col-lg-5 mb-3 mb-lg-0">
                    <div class="d-flex align-items-center bg-light border rounded-pill px-3 py-2">
                        <svg viewBox="0 0 24 24" fill="#9CA3AF" width="18" height="18" class="me-2 flex-shrink-0">
                            <path
                                d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                        </svg>
                        <input type="text" id="location-display"
                            class="form-control border-0 bg-transparent shadow-none p-0 me-3"
                            placeholder="Enter area or city..." style="font-size:14px;">
                        <div style="width:1px;height:20px;background:var(--color-border);" class="me-3"></div>
                        <input type="text" id="service-input"
                            class="form-control border-0 bg-transparent shadow-none p-0"
                            placeholder="Service (e.g. AC Repair)" style="font-size:14px;">
                        <button class="btn btn-sm rounded-pill px-3 text-white ms-2 flex-shrink-0"
                            style="background:var(--color-primary);font-size:13px;" onclick="onSearch()">
                            Search
                        </button>
                    </div>
                </div>

                <!-- Filter chips -->
                <div class="col-12 col-lg-7 d-flex align-items-center gap-2 overflow-auto pb-1"
                    style="scrollbar-width:none;">
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1 active"
                        id="chip-nearest" onclick="setSort('nearest',this)">Nearest</button>
                    <button class="btn btn-outline-secondary filter-chip rounded-pill px-3 py-1" id="chip-open"
                        onclick="toggleChip('open')">Open Now</button>
                    <select id="radius-select" class="form-select form-select-sm rounded-pill border px-3"
                        style="font-size:13px;width:auto;cursor:pointer;" onchange="changeRadius(this.value)">
                        <option value="2">Within 2 km</option>
                        <option value="5">Within 5 km</option>
                        <option value="10">Within 10 km</option>
                        <option value="20">Within 20 km</option>
                    </select>
                </div>

            </div>
        </div>
    </div>

    <!-- ═══ MAIN LAYOUT ═══ -->
    <div class="container-fluid px-0 mb-5">
        <div class="row g-0">

            <!-- LEFT: LIST -->
            <div class="col-12 p-3 p-md-4" id="list-panel" style="overflow:visible;">

                <!-- Result count -->
                <h4 class="fw-bold mb-4" id="result-count" style="font-family:var(--font-head); width: 100%;">
                    Finding garages near you...
                </h4>

                <!-- Cards -->
                <div id="garage-container"></div>

                <!-- Pagination -->
                <div class="container mt-4 mb-5">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                        <div id="pagination-info" class="text-muted" style="font-size:14px;"></div>
                        <nav>
                            <ul id="pagination" class="pagination mb-0 align-items-center gap-2"></ul>
                        </nav>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="footer-container"></div>

    <script src="/js/components.js"></script>
    <script>
        Promise.all([
            loadComponent('navbar-container', 'components/navbar.html', () => {
                setActiveSidebarLink();
                initCustomerMenu();
            }),
            loadComponent('footer-container', 'components/footer.html')
        ]);
    </script>

    <script src="/js/config.js"></script>
    <script>
        const ITEMS_PER_PAGE = 10;

        let allGarages = [];
        let filtered = [];
        let currentPage = 1;
        let userLat = null;
        let userLng = null;

        // filter state
        let fOpen = false;
        let serviceQuery = '';
        let searchRadius = 2.0;

        // ── Boot ──
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(location.search);

            // Service from URL or index search
            if (params.get('service')) {
                document.getElementById('service-input').value = params.get('service');
                serviceQuery = params.get('service');
            }

            document.getElementById('service-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') onSearch();
            });

            // Location input: re-search on Enter
            document.getElementById('location-display').addEventListener('keydown', e => {
                if (e.key === 'Enter') geocodeAndFetch(document.getElementById('location-display').value.trim());
            });

            // GPS coords from index page search
            const urlLat = parseFloat(params.get('lat'));
            const urlLng = parseFloat(params.get('lng'));
            const urlLoc = params.get('location') || '';

            if (!isNaN(urlLat) && !isNaN(urlLng)) {
                // Came from index with GPS detected
                userLat = urlLat;
                userLng = urlLng;
                document.getElementById('location-display').value = urlLoc || 'Your Location';
                fetchWithCoordinates(userLat, userLng);
            } else if (urlLoc) {
                // Came from index with text location
                document.getElementById('location-display').value = urlLoc;
                geocodeAndFetch(urlLoc);
            } else {
                // Fresh visit — try GPS
                getLocation();
            }
        });

        // ── Geocode text → lat/lng using Nominatim ──
        async function geocodeAndFetch(locationText) {
            if (!locationText) { getLocation(); return; }
            showSkeletons();
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationText)}&format=json&limit=1&countrycodes=in`
                );
                const data = await res.json();
                if (data && data.length > 0) {
                    userLat = parseFloat(data[0].lat);
                    userLng = parseFloat(data[0].lon);
                    document.getElementById('location-display').value = data[0].display_name.split(',').slice(0, 2).join(',').trim();
                        fetchWithCoordinates(userLat, userLng);
                } else {
                    fallback();
                }
            } catch (_) {
                fallback();
            }
        }

        // ── GPS Location ──
        function getLocation() {
            showSkeletons();
            if (!navigator.geolocation) { showLocationPrompt(); return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    document.getElementById('location-display').value = 'Your Location';
                    // Reverse geocode for display
                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`)
                        .then(r => r.json())
                        .then(d => {
                            const area = d.address?.suburb || d.address?.city_district || d.address?.city || 'Your Location';
                            document.getElementById('location-display').value = area;
                        })
                        .catch(() => {});
                        fetchWithCoordinates(userLat, userLng);
                },
                () => showLocationPrompt(),
                { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 }
            );
        }

        function showLocationPrompt() {
            document.getElementById('result-count').textContent = '';
            document.getElementById('garage-container').innerHTML = `
                <div class="text-center py-5">
                    <svg viewBox="0 0 24 24" fill="#9CA3AF" width="56" height="56" class="mb-3">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <h5 class="fw-bold mb-2" style="color:var(--color-text);">Location detect nahi hua</h5>
                    <p class="text-muted mb-4" style="font-size:14px;">Browser mein location permission allow karein, ya search bar mein apna area type karein.</p>
                    <div class="d-flex gap-2 justify-content-center flex-wrap">
                        <button class="btn rounded-pill px-4 text-white fw-bold" style="background:var(--color-primary);" onclick="getLocation()">
                            📍 Dobara Try Karein
                        </button>
                        <button class="btn btn-outline-secondary rounded-pill px-4 fw-bold" onclick="fallback()">
                            🏙️ Ahmedabad Use Karein
                        </button>
                    </div>
                </div>`;
            document.getElementById('pagination-info').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        function fallback() {
            userLat = 23.0225; userLng = 72.5714;
            document.getElementById('location-display').value = 'Ahmedabad';
            fetchWithCoordinates(userLat, userLng);
        }

        // ── Radius change ──
        function changeRadius(val) {
            searchRadius = parseFloat(val);
            fetchWithCoordinates(userLat ?? 23.0225, userLng ?? 72.5714);
        }

        // ── Fetch ──
        async function fetchWithCoordinates(lat, lng) {
            showSkeletons();
            try {
                let url = `${getApiBase()}/garage/nearby?lat=${lat}&lng=${lng}&radius=${searchRadius}`;
                if (serviceQuery) url += `&service_name=${encodeURIComponent(serviceQuery)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allGarages = await res.json();
                applyFilters();
            } catch (e) {
                showError(e.message);
            }
        }

        function onSearch() {
            serviceQuery = document.getElementById('service-input').value.trim();
            const locText = document.getElementById('location-display').value.trim();
            // If location text doesn't match current coords (user typed something new), geocode it
            if (locText && locText !== 'Your Location' && locText !== 'Ahmedabad (approx.)' && userLat === null) {
                geocodeAndFetch(locText);
            } else {
                fetchWithCoordinates(userLat ?? 23.0225, userLng ?? 72.5714);
            }
        }

        // ── Filters ──
        function setSort(mode, btn) {
            document.getElementById('chip-nearest').classList.toggle('active', mode === 'nearest');
            applyFilters();
        }

        function toggleChip(type) {
            if (type === 'open') fOpen = !fOpen;
            document.getElementById('chip-open').classList.toggle('active', fOpen);
            applyFilters();
        }

        function applyFilters() {
            let data = [...allGarages];
            if (fOpen) data = data.filter(g => g.is_open_now);
            data.sort((a, b) => a.distance_km - b.distance_km);
            filtered = data;
            currentPage = 1;
            showPage(1);
        }

        // ── Render ──
        function showPage(page) {
            currentPage = page;
            const container = document.getElementById('garage-container');
            const countEl = document.getElementById('result-count');

            if (filtered.length === 0) {
                countEl.textContent = '0 Garages found near you';
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="var(--color-border)" width="64" height="64" class="mb-3">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        <h5 class="fw-bold mb-2" style="color:var(--color-text);">No garages found</h5>
                        <p style="font-size:14px;">No garages found within a 2km radius.<br>Try changing your filters.</p>
                    </div>`;
                document.getElementById('pagination-info').textContent = '';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            countEl.textContent = `${filtered.length} Garage${filtered.length !== 1 ? 's' : ''} found near you`;

            const start = (page - 1) * ITEMS_PER_PAGE;
            const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);
            container.innerHTML = '<div class="row g-4">' + pageData.map(g => createGarageCard(g)).join('') + '</div>';
            updatePagination();
        }

        function createGarageCard(g) {
            const street = g.location?.street || '';
            const city = g.location?.city || 'Ahmedabad';
            const address = street ? `${street}, ${city}` : city;
            const services = (g.services || []).slice(0, 3)
                .map(s => `<span class="badge bg-light text-dark border" style="font-size:12px;">${s.service_name}</span>`).join('');
            const hasLogo = !!g.logo_url;
            const defaultImg = 'https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=600';
            const imgStyle = hasLogo
                ? `background-image:url('${g.logo_url}'); background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#f8f9fa;`
                : `background-image:url('${defaultImg}'); background-size:cover; background-position:center;`;

            return `
            <div class="col-12 col-md-6">
              <div class="garage-item card border h-100 rounded-4 shadow-sm overflow-hidden"
                   id="card-${g.id}"
                   onclick="window.location.href='garage-details/${g.slug || g.id}'"
                   onmouseenter="hoverMarker(${g.id})"
                   onmouseleave="unhoverMarker()">
                <div class="row g-0 h-100">
                  <div class="col-5 flex-shrink-0" style="${imgStyle} min-height:160px; ${g.is_open_now ? '' : 'filter:grayscale(55%);'}"></div>
                  <div class="col-7 d-flex flex-column">
                    <div class="card-body p-3 d-flex flex-column h-100">
                      <div class="d-flex justify-content-between align-items-start mb-1">
                        <h6 class="fw-bold mb-0 text-truncate me-1" style="font-family:var(--font-head); font-size:14px;">${g.name}</h6>
                        ${g.is_verified ? `<span class="badge bg-success rounded-pill px-2 flex-shrink-0" style="font-size:10px;">✓</span>` : ''}
                      </div>
                      <p class="text-muted mb-2" style="font-size:12px;">
                        <span class="fw-semibold text-dark">${g.distance_km} km</span> • ${address}
                      </p>
                      <div class="d-flex flex-wrap gap-1 mb-2">
                        ${services || '<span class="badge bg-light text-dark border" style="font-size:11px;">General Service</span>'}
                        ${g.offers_pick_and_drop ? '<span class="badge bg-light text-dark border" style="font-size:11px;">🚗 Drop</span>' : ''}
                      </div>
                      <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="${g.is_open_now ? 'text-success' : 'text-danger'} fw-bold" style="font-size:12px;">${g.is_open_now ? 'Open' : 'Closed'}</span>
                        <button class="btn btn-sm rounded-pill text-white px-2 py-1" style="background:var(--color-primary); font-size:12px;"
                            onclick="event.stopPropagation();window.location.href='garage-details/${g.slug || g.id}'">
                            Book Now
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
        }

        // ── Pagination ──
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const paginationInfo = document.getElementById('pagination-info');
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                paginationInfo.innerHTML = '';
                return;
            }

            const startItem = ((currentPage - 1) * ITEMS_PER_PAGE) + 1;
            const endItem = Math.min(currentPage * ITEMS_PER_PAGE, filtered.length);
            paginationInfo.innerHTML = `Showing <b>${startItem}-${endItem}</b> of <b>${filtered.length}</b> garages`;

            let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link rounded-pill border shadow-sm px-3" href="#" onclick="gotoPage(event,${currentPage - 1})">← Prev</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link rounded-circle border shadow-sm d-flex align-items-center justify-content-center"
                       href="#" style="width:42px;height:42px;" onclick="gotoPage(event,${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link rounded-pill border shadow-sm px-3" href="#" onclick="gotoPage(event,${currentPage + 1})">Next →</a></li>`;
            pagination.innerHTML = html;
        }

        function gotoPage(e, page) {
            e.preventDefault();
            const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            if (page < 1 || page > total) return;
            showPage(page);
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        function hoverMarker(id) {}
        function unhoverMarker() {}


        // ── Skeleton ──
        function showSkeletons() {
            document.getElementById('result-count').textContent = 'Finding garages near you...';
            document.getElementById('garage-container').innerHTML = '<div class="row g-4">' + [1,2,3,4].map(() => `
                <div class="col-12 col-md-6">
                  <div class="card border rounded-4 shadow-sm overflow-hidden h-100">
                    <div class="row g-0">
                      <div class="col-5 skeleton" style="min-height:160px; border-radius:0;"></div>
                      <div class="col-7 p-3">
                        <div class="skeleton mb-2" style="height:16px;width:70%;"></div>
                        <div class="skeleton mb-3" style="height:12px;width:50%;"></div>
                        <div class="d-flex gap-1 mb-3">
                          <div class="skeleton" style="height:20px;width:65px;border-radius:20px;"></div>
                          <div class="skeleton" style="height:20px;width:65px;border-radius:20px;"></div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-auto">
                          <div class="skeleton" style="height:12px;width:35px;"></div>
                          <div class="skeleton" style="height:28px;width:75px;border-radius:20px;"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>`).join('') + '</div>';
            document.getElementById('pagination-info').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        // ── Error ──
        function showError(msg) {
            document.getElementById('result-count').textContent = '';
            document.getElementById('garage-container').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="var(--color-danger,#E53E3E)" width="48" height="48" class="mb-3">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <h5 class="fw-bold mb-2">Something went wrong</h5>
                    <p style="font-size:14px;">${msg}</p>
                    <button class="btn btn-sm rounded-pill px-4 text-white mt-2" style="background:var(--color-primary);"
                        onclick="fetchWithCoordinates(userLat,userLng)">Try Again</button>
                </div>`;
        }
    </script>

    <script src="/js/bootstrap.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>

    <link rel="stylesheet" href="../css/style.css" />
    <link

            color: var(--color-primary);
            font-weight: 600;
        }
        .nav-pills .nav-link {
            color: var(--color-text-muted);
            border-radius: 50rem;
            padding: 8px 24px;
        }
        .nav-pills .nav-link.active {
            background-color: var(--color-primary);
        }
    </style>
</head>

<body style="background:var(--color-bg); min-height:100vh; display: flex; flex-direction: column;">

    <!-- ═══ NAVBAR ═══ -->
    <nav class="gnm-nav sticky-top shadow-sm border-bottom">
        <div class="gnm-nav-inner justify-content-between">
            <a href="index.html" class="gnm-logo text-decoration-none">

                    </svg>
                </div>
                <span class="gnm-logo-text">GarageNearMe</span>
            </a>
            
            <div class="d-none d-md-flex align-items-center gap-3">
                <a href="search-results.html" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Find Garage</a>
                <div class="dropdown">
                    <div id="topAvatarCircle" class="rounded-circle bg-secondary d-flex justify-content-center align-items-center text-white fw-bold shadow-sm cursor-pointer" style="width:40px; height:40px; font-family:var(--font-head);" data-bs-toggle="dropdown">
                        JD
                    </div>
                </div>
            </div>
            
            <button class="gnm-hamburger d-md-none" id="menuBtn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="container py-4 py-md-5 flex-grow-1">
        <div class="row g-4 g-lg-5">
            
            <!-- ── LEFT SIDEBAR ── -->
            <div class="col-lg-3">
                <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top:100px;">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <div id="sidebarAvatarCircle" class="rounded-circle d-flex justify-content-center align-items-center text-white fw-bold flex-shrink-0" style="width:56px; height:56px; background:var(--color-primary); font-size:20px; font-family:var(--font-head);">
                                JD
                            </div>
                            <div>
                                <h6 class="fw-bold mb-0" style="font-family:var(--font-head); color:var(--color-text);">John Doe</h6>
                                <p class="text-muted small mb-0">+91 98765 43210</p>
                            </div>
                        </div>

                        <hr class="mb-4">

                        <nav class="nav flex-column dashboard-nav">
                            <a class="nav-link d-flex align-items-center gap-3" href="dashboard.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                                Dashboard Overview
                            </a>
                            <a class="nav-link active d-flex align-items-center gap-3" href="my-bookings.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
                                My Bookings
                            </a>
                            <a class="nav-link d-flex align-items-center gap-3" href="my-vehicles.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
                                My Vehicles
                            </a>
                            <a class="nav-link d-flex align-items-center gap-3" href="past-history.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                                Past History
                            </a>
                            <a class="nav-link d-flex align-items-center gap-3" href="profile.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                Profile Settings
                            </a>
                            <a class="nav-link text-danger d-flex align-items-center gap-3 mt-4" href="login.html">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                                Logout
                            </a>
                        </nav>
                    </div>
                </div>
            </div>

            <!-- ── RIGHT CONTENT (My Bookings) ── -->
            <div class="col-lg-9">
                <h3 class="fw-bold mb-4" style="font-family:var(--font-head); color:var(--color-text);">My Bookings</h3>

                <!-- Booking Tabs -->
                <ul class="nav nav-pills mb-4" id="bookingTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-medium border shadow-sm me-2" id="active-tab" data-bs-toggle="pill" data-bs-target="#active" type="button" role="tab">Active Bookings</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link fw-medium border shadow-sm me-2" href="past-history.html">Past History</a>
                    </li>
                </ul>

                <div class="tab-content" id="bookingTabsContent">
                    
                    <!-- ACTIVE BOOKINGS -->
                    <div class="tab-pane fade show active" id="active" role="tabpanel">
                        <div id="activeBookingsContainer">
                            <div class="text-center py-5 text-muted">
                                <p>Loading active bookings...</p>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <footer class="gnm-footer mt-auto py-3 bg-white border-top text-center text-muted" style="font-size:13px;">
        &copy; 2026 GarageNearMe. All rights reserved.
    </footer>

    <script src="../js/bootstrap.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/script.js"></script>
    <script>
        const token = localStorage.getItem('gnm_token');

        function authHeaders() {
            return { 'Authorization': `Bearer ${token}` };
        }

        async function loadUserInfo() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${getApiBase()}/auth/me`, {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    throw new Error('Failed to load user info');
                }

                const data = await response.json();
                const initials = data.name ? data.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'JD';
                const avatarHtml = data.profile_image
                    ? `<img src="${getApiBase()}${data.profile_image}" alt="Profile" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
                    : initials;

                const topAvatar = document.getElementById('topAvatarCircle');
                const sidebarAvatar = document.getElementById('sidebarAvatarCircle');
                if (topAvatar) topAvatar.innerHTML = avatarHtml;
                if (sidebarAvatar) sidebarAvatar.innerHTML = avatarHtml;

                if (!data.profile_image) {
                    document.querySelectorAll('.rounded-circle').forEach(el => {
                        if (el.textContent.trim() === 'JD') {
                            el.textContent = initials;
                        }
                    });
                }

                document.querySelectorAll('h6').forEach(el => {
                    if (el.textContent.trim() === 'John Doe') {
                        el.textContent = data.name || 'John Doe';
                        if (el.nextElementSibling) {
                            el.nextElementSibling.textContent = data.phone || '+91 98765 43210';
                        }
                    }
                });
            } catch (err) {
                console.error('User info load error:', err);
                localStorage.removeItem('gnm_token');
                localStorage.removeItem('gnm_role');
                window.location.href = 'login.html';
            }
        }


        async function loadActiveBookings() {
            try {
                if (!token) {
                    console.error('No token found');
                    document.getElementById('activeBookingsContainer').innerHTML = '<div class="text-center py-5 text-danger"><p>Not authenticated. Please login.</p></div>';
                    return;
                }

                console.log('Fetching bookings from:', `${getApiBase()}/bookings/my`);
                const response = await fetch(`${getApiBase()}/bookings/my`, {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const bookings = await response.json();
                console.log('All bookings:', bookings);

                const activeBookings = bookings.filter(b => b.status === 'pending' || b.status === 'accepted' || b.status === 'ongoing');
                console.log('Active bookings:', activeBookings);

                const container = document.getElementById('activeBookingsContainer');

                if (activeBookings.length === 0) {
                    container.innerHTML = '<div class="text-center py-5 text-muted"><p>No active bookings at the moment.</p></div>';
                    return;
                }

                let html = '';
                activeBookings.forEach(booking => {
                    const date = new Date(booking.created_at).toLocaleDateString('en-IN');
                    const amount = booking.final_amount ? `₹${parseFloat(booking.final_amount).toLocaleString()}` : 'Estimating...';
                    const serviceName = booking.service_type || (booking.booking_type === 'sos' ? 'Emergency SOS' : 'General Service');

                    // Status badge for active
                    let statusBadge = '';
                    if (booking.status === 'pending') {
                        statusBadge = '<span class="badge bg-info text-white rounded-pill px-3 py-1">Waiting for Garage</span>';
                    } else if (booking.status === 'accepted') {
                        statusBadge = '<span class="badge bg-primary text-white rounded-pill px-3 py-1">Accepted</span>';
                    } else if (booking.status === 'ongoing') {
                        statusBadge = '<span class="badge bg-warning text-dark rounded-pill px-3 py-1">In Progress</span>';
                    }

                    // Payment status
                    const paymentBadge = booking.payment_status === 'paid'
                        ? '<span class="badge bg-success rounded-pill ms-2">Paid ✓</span>'
                        : '<span class="badge bg-light border border-secondary rounded-pill ms-2" style="color: #666;">Pending</span>';

                    html += `
                        <div class="card border border-primary shadow-sm rounded-4 overflow-hidden mb-4">
                            <div class="card-header bg-primary text-white p-3 d-flex justify-content-between align-items-center">
                                <div class="fw-medium">Booking ID: #GNM-${booking.id}</div>
                                <div>${statusBadge}${paymentBadge}</div>
                            </div>
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <h5 class="fw-bold mb-1" style="font-family:var(--font-head); color:var(--color-text);">${serviceName}</h5>
                                        <p class="text-muted small mb-0">${booking.garage_name || 'Searching for garage...'}</p>
                                    </div>
                                    <div class="text-end">
                                        <div class="fw-bold fs-5 text-dark">${amount}</div>
                                        <div class="text-muted small">${booking.payment_status === 'paid' ? 'Paid' : 'Pending'}</div>
                                    </div>
                                </div>
                                <hr>
                                <div class="d-flex align-items-center justify-content-between text-muted small mb-3">
                                    <span>Date: <strong class="text-dark">${date}</strong></span>
                                    <span>Vehicle: <strong class="text-dark">${booking.vehicle_number || 'N/A'}</strong></span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-primary rounded-pill px-4" onclick="trackBooking(${booking.id})">Track Status</button>
                                    <button class="btn btn-sm btn-outline-danger rounded-pill px-4" onclick="cancelBooking(${booking.id})">Cancel</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (err) {
                console.error('Error loading active bookings:', err);
                document.getElementById('activeBookingsContainer').innerHTML = `<div class="text-center py-5"><div class="text-danger"><p><strong>Error loading active bookings.</strong></p><p style="font-size: 12px;">${err.message}</p></div><button class="btn btn-sm btn-outline-primary mt-3" onclick="location.reload()">Retry</button></div>`;
            }
        }

        function trackBooking(bookingId) {
            alert('Track Status feature coming soon!');
        }

        function cancelBooking(bookingId) {
            if (confirm('Are you sure you want to cancel this booking?')) {
                alert('Cancellation feature coming soon!');
            }
        }

        function rebook(bookingId) {
            alert('Rebook feature coming soon!');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadActiveBookings();
        });
    </script>
</body>

</html>

                            <div class="text-center py-5 text-muted">

    <!-- ═══ FOOTER ═══ -->
    <footer class="gnm-footer mt-auto py-3 bg-white border-top text-center text-muted" style="font-size:13px;">
        &copy; 2026 GarageNearMe. All rights reserved.
    </footer>

    <script src="/js/bootstrap.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/script.js"></script>
    <script>
        const token = localStorage.getItem('gnm_token');
        const ITEMS_PER_PAGE = 5;
        
        // State management
        let allActiveBookings = [];
        let allSOSBookings = [];
        let currentActiveBookingPage = 1;
        let currentSOSPage = 1;
        let activeSearchQuery = '';
        let sosSearchQuery = '';

        function authHeaders() {
            return { 'Authorization': `Bearer ${token}` };
        }

        async function loadUserInfo() {
            if (!token) {
                window.location.href = 'login';
                return;
            }

            try {
                const response = await fetch(`${getApiBase()}/auth/me`, {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    throw new Error('Failed to load user info');
                }

                const data = await response.json();
                const initials = data.name ? data.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2) : 'JD';
                const avatarHtml = data.profile_image
                    ? `<img src="${window.location.origin}${data.profile_image}" alt="Profile" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`
                    : initials;

                const topAvatar = document.getElementById('topAvatarCircle');
                const sidebarAvatar = document.getElementById('sidebarAvatarCircle');
                if (topAvatar) topAvatar.innerHTML = avatarHtml;
                if (sidebarAvatar) sidebarAvatar.innerHTML = avatarHtml;

                if (!data.profile_image) {
                    document.querySelectorAll('.rounded-circle').forEach(el => {
                        if (el.textContent.trim() === 'JD') {
                            el.textContent = initials;
                        }
                    });
                }

                document.querySelectorAll('h6').forEach(el => {
                    if (el.textContent.trim() === 'John Doe') {
                        el.textContent = data.name || 'John Doe';
                        if (el.nextElementSibling) {
                            el.nextElementSibling.textContent = data.phone || '+91 98765 43210';
                        }
                    }
                });
            } catch (err) {
                console.error('User info load error:', err);
                localStorage.removeItem('gnm_token');
                localStorage.removeItem('gnm_role');
                window.location.href = 'login';
            }
        }

        // Filter bookings based on search query
        function filterBookings(bookings, searchQuery) {
            if (!searchQuery.trim()) return bookings;
            const query = searchQuery.toLowerCase();
            return bookings.filter(b => 
                (b.garage_name && b.garage_name.toLowerCase().includes(query)) ||
                (b.vehicle_number && b.vehicle_number.toLowerCase().includes(query)) ||
                b.id.toString().includes(query)
            );
        }

        // Get paginated items
        function getPaginatedItems(items, page) {
            const start = (page - 1) * ITEMS_PER_PAGE;
            return items.slice(start, start + ITEMS_PER_PAGE);
        }

        // Render pagination controls
        function renderPagination(totalItems, currentPage, containerId, onPageChange) {
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            const container = document.getElementById(containerId);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<nav><ul class="pagination justify-content-center">';
            
            // Previous button
            if (currentPage > 1) {
                html += `<li class="page-item"><button class="page-link" onclick="${onPageChange}(${currentPage - 1})">← Previous</button></li>`;
            } else {
                html += `<li class="page-item disabled"><span class="page-link">← Previous</span></li>`;
            }

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<li class="page-item active"><span class="page-link">${i}</span></li>`;
                } else {
                    html += `<li class="page-item"><button class="page-link" onclick="${onPageChange}(${i})">${i}</button></li>`;
                }
            }

            // Next button
            if (currentPage < totalPages) {
                html += `<li class="page-item"><button class="page-link" onclick="${onPageChange}(${currentPage + 1})">Next →</button></li>`;
            } else {
                html += `<li class="page-item disabled"><span class="page-link">Next →</span></li>`;
            }

            html += '</ul></nav>';
            container.innerHTML = html;
        }

        async function loadActiveBookings() {
            try {
                if (!token) {
                    document.getElementById('activeBookingsContainer').innerHTML = '<div class="text-center py-5 text-danger"><p>Not authenticated. Please login.</p></div>';
                    return;
                }

                const response = await fetch(`${getApiBase()}/bookings/my`, {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                const bookings = await response.json();
                allActiveBookings = bookings.filter(b => (b.status === 'pending' || b.status === 'accepted' || b.status === 'ongoing') && b.booking_type !== 'sos');
                
                displayActiveBookings(1);
            } catch (err) {
                console.error('Error loading active bookings:', err);
                document.getElementById('activeBookingsContainer').innerHTML = `<div class="text-center py-5"><div class="text-danger"><p><strong>Error loading bookings.</strong></p><p style="font-size: 12px;">${err.message}</p></div><button class="btn btn-sm btn-outline-primary mt-3" onclick="loadActiveBookings()">Retry</button></div>`;
            }
        }

        function displayActiveBookings(page) {
            currentActiveBookingPage = page;
            const filteredBookings = filterBookings(allActiveBookings, activeSearchQuery);
            const paginatedBookings = getPaginatedItems(filteredBookings, page);
            const container = document.getElementById('activeBookingsContainer');

            if (filteredBookings.length === 0) {
                container.innerHTML = '<div class="text-center py-5 text-muted"><p>No active bookings found.</p></div>';
                document.getElementById('activePaginationContainer').innerHTML = '';
                return;
            }

            let html = '';
            paginatedBookings.forEach(booking => {
                const date = new Date(booking.created_at).toLocaleDateString('en-IN');
                const amount = booking.final_amount ? `₹${parseFloat(booking.final_amount).toLocaleString()}` : 'Estimating...';
                const serviceName = booking.service_type || 'General Service';

                let statusBadge = '';
                if (booking.status === 'pending') {
                    statusBadge = '<span class="badge bg-info text-white rounded-pill px-3 py-1">Waiting for Garage</span>';
                } else if (booking.status === 'accepted') {
                    statusBadge = '<span class="badge bg-primary text-white rounded-pill px-3 py-1">Accepted</span>';
                } else if (booking.status === 'ongoing') {
                    statusBadge = '<span class="badge bg-warning text-dark rounded-pill px-3 py-1">In Progress</span>';
                }

                const paymentBadge = booking.payment_status === 'paid'
                    ? '<span class="badge bg-success rounded-pill ms-2">Paid ✓</span>'
                    : '<span class="badge bg-light border border-secondary rounded-pill ms-2" style="color: #666;">Pending</span>';

                html += `
                    <div class="card border border-primary shadow-sm rounded-4 overflow-hidden mb-4">
                        <div class="card-header bg-primary text-white p-3 d-flex justify-content-between align-items-center">
                            <div class="fw-medium">Booking ID: #GNM-${booking.id}</div>
                            <div>${statusBadge}${paymentBadge}</div>
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="fw-bold mb-1" style="font-family:var(--font-head); color:var(--color-text);">${serviceName}</h5>
                                    <p class="text-muted small mb-0">${booking.garage_name || 'Searching for garage...'}</p>
                                </div>
                                <div class="text-end">
                                    <div class="fw-bold fs-5 text-dark">${amount}</div>
                                    <div class="text-muted small">${booking.payment_status === 'paid' ? 'Paid' : 'Pending'}</div>
                                </div>
                            </div>
                            <hr>
                            <div class="d-flex align-items-center justify-content-between text-muted small mb-3">
                                <span>Date: <strong class="text-dark">${date}</strong></span>
                                <span>Vehicle: <strong class="text-dark">${booking.vehicle_number || 'N/A'}</strong></span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary rounded-pill px-4" onclick="trackBooking('${booking.slug || booking.id}')">Track Status</button>
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-4" onclick="cancelBooking(${booking.id})">Cancel</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            renderPagination(filteredBookings.length, page, 'activePaginationContainer', 'displayActiveBookings');
        }

        async function loadSOSBookings() {
            try {
                if (!token) {
                    document.getElementById('sosBookingsContainer').innerHTML = '<div class="text-center py-5 text-danger"><p>Not authenticated. Please login.</p></div>';
                    return;
                }

                const response = await fetch(`${getApiBase()}/sos/customer/history`, {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const sosRequests = await response.json();
                allSOSBookings = sosRequests || [];
                
                displaySOSBookings(1);
            } catch (err) {
                console.error('Error loading SOS bookings:', err);
                document.getElementById('sosBookingsContainer').innerHTML = `<div class="text-center py-5"><div class="text-danger"><p><strong>Error loading SOS bookings.</strong></p><p style="font-size: 12px;">${err.message}</p></div><button class="btn btn-sm btn-outline-danger mt-3" onclick="loadSOSBookings()">Retry</button></div>`;
            }
        }

        function displaySOSBookings(page) {
            currentSOSPage = page;
            const filteredBookings = filterBookings(allSOSBookings, sosSearchQuery);
            const paginatedBookings = getPaginatedItems(filteredBookings, page);
            const container = document.getElementById('sosBookingsContainer');

            if (filteredBookings.length === 0) {
                container.innerHTML = '<div class="text-center py-5 text-muted"><p>No SOS bookings found.</p></div>';
                document.getElementById('sosPaginationContainer').innerHTML = '';
                return;
            }

            let html = '';
            paginatedBookings.forEach(sos => {
                const date = new Date(sos.created_at).toLocaleDateString('en-IN');
                const time = new Date(sos.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                const amount = sos.final_charge ? `₹${parseFloat(sos.final_charge).toLocaleString()}` : (sos.estimated_charge ? `₹${parseFloat(sos.estimated_charge).toLocaleString()}` : 'Estimating...');

                let statusBadge = '';
                let headerClass = 'bg-danger';
                
                const status = sos.status;
                if (status === 'broadcasting') {
                    statusBadge = '<span class="badge bg-warning text-dark rounded-pill px-3 py-1">🆘 Broadcasting</span>';
                } else if (status === 'accepted') {
                    statusBadge = '<span class="badge bg-info text-white rounded-pill px-3 py-1">✓ Accepted</span>';
                } else if (status === 'on_the_way') {
                    statusBadge = '<span class="badge bg-success text-white rounded-pill px-3 py-1">🚗 On The Way</span>';
                } else if (status === 'in_progress') {
                    statusBadge = '<span class="badge bg-success text-white rounded-pill px-3 py-1">⚙️ In Progress</span>';
                } else if (status === 'completed') {
                    statusBadge = '<span class="badge bg-secondary text-white rounded-pill px-3 py-1">✓ Completed</span>';
                    headerClass = 'bg-secondary';
                } else if (status === 'cancelled') {
                    statusBadge = '<span class="badge bg-light border border-danger rounded-pill px-3 py-1" style="color: #DC2626;">✕ Cancelled</span>';
                    headerClass = 'bg-light border border-danger';
                }

                const isActive = ['broadcasting', 'accepted', 'on_the_way', 'in_progress'].includes(status);

                html += `
                    <div class="card border-2 border-danger shadow-sm rounded-4 overflow-hidden mb-4" style="background: #FFFBFA;">
                        <div class="card-header ${headerClass} text-white p-3 d-flex justify-content-between align-items-center">
                            <div class="fw-medium d-flex align-items-center gap-2">
                                <span style="font-size: 18px;">🚨</span>
                                ${sos.sos_number || 'SOS #' + sos.id}
                            </div>
                            <div>${statusBadge}</div>
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="fw-bold mb-1" style="font-family:var(--font-head); color:var(--color-text);">Emergency Assistance</h5>
                                    <p class="text-muted small mb-0">${sos.garage_name || 'Searching for mechanic...'}</p>
                                </div>
                                <div class="text-end">
                                    <div class="fw-bold fs-5" style="color: #EF4444;">${amount}</div>
                                    <div class="text-muted small">Pending</div>
                                </div>
                            </div>
                            <hr>
                            <div class="d-flex align-items-center justify-content-between text-muted small mb-3">
                                <span>Date: <strong class="text-dark">${date} ${time}</strong></span>
                                <span>Vehicle: <strong class="text-dark">${sos.vehicle_number || 'N/A'}</strong></span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-4" onclick="trackSOS('${sos.slug || sos.id}')">View Details</button>
                                ${isActive ? `<button class="btn btn-sm btn-outline-secondary rounded-pill px-4" onclick="cancelSOS(${sos.id})">Cancel SOS</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            renderPagination(filteredBookings.length, page, 'sosPaginationContainer', 'displaySOSBookings');
        }

        function trackSOS(sosSlug) {
            window.location.href = `/customer/sos-tracking?sos=${sosSlug}`;
        }

        function cancelSOS(sosId) {
            showSOSCancelConfirm(sosId);
        }

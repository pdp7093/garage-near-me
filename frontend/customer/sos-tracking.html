<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOS Tracking — GarageNearMe</title>
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500&display=swap"
        rel="stylesheet" />
    
    <style>
        .radar-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .radar-core {
            width: 80px;
            height: 80px;
            background: #DC2626; /* Danger Red */
            border-radius: 50%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }
        .radar-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #DC2626;
            animation: pulse 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .radar-ring.ring-2 { animation-delay: 0.6s; }
        .radar-ring.ring-3 { animation-delay: 1.2s; }
        
        @keyframes pulse {
            0% { transform: scale(0.4); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .map-bg {
            background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body style="background:var(--color-bg); min-height:100vh; display: flex; flex-direction: column; position: relative;">

    <!-- Background Map -->
    <div class="map-bg"></div>

    <!-- ═══ NAVBAR (Minimal) ═══ -->
    <nav class="gnm-nav sticky-top shadow-sm border-bottom" style="z-index:10;">
        <div class="gnm-nav-inner justify-content-between">
            <a href="index.html" class="gnm-logo text-decoration-none">
                <div class="gnm-logo-icon" style="background:#DC2626;">
                    <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                </div>
                <span class="gnm-logo-text text-danger">SOS Mode</span>
            </a>
            <div class="d-flex align-items-center gap-2 fw-medium text-danger" style="font-size:14px;">
                <span class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>
                Live Tracking
            </div>
        </div>
    </nav>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="container py-5 flex-grow-1 d-flex flex-column justify-content-center align-items-center" style="z-index:1;">
        
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <!-- Radar UI Card -->
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-4 bg-white" id="radarCard">
                    <div class="card-body p-5 text-center">
                        
                        <div class="radar-container mb-4">
                            <div class="radar-ring ring-1"></div>
                            <div class="radar-ring ring-2"></div>
                            <div class="radar-ring ring-3"></div>
                            <div class="radar-core">
                                <svg viewBox="0 0 24 24" fill="white" width="36" height="36"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            </div>
                        </div>

                        <h3 class="fw-bold text-danger mb-2" style="font-family:var(--font-head);">Broadcasting SOS</h3>
                        <p class="text-muted mb-4">Alerting all verified mechanics within 5km radius of your location...</p>

                        <div class="d-flex justify-content-center gap-2">
                            <div class="spinner-border spinner-border-sm text-danger" role="status"></div>
                            <span class="text-muted small fw-medium">Waiting for mechanic to accept...</span>
                        </div>
                    </div>
                </div>

                <!-- Mechanic Found Card (Simulated as visible for demo purposes) -->
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="border-top: 5px solid #10B981 !important;">
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0 text-success" style="font-family:var(--font-head);">Mechanic En Route!</h5>
                            <span class="badge bg-success-subtle text-success rounded-pill px-3 py-2 fw-bold" style="font-size:14px;">ETA: 8 Mins</span>
                        </div>

                        <div class="d-flex align-items-center gap-4 mb-4 bg-light p-3 rounded-4 border">
                            <div class="position-relative">
                                <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white fw-bold shadow-sm" style="width:64px; height:64px; font-size:24px;">SA</div>
                                <span class="position-absolute bottom-0 end-0 p-1 bg-success border border-light rounded-circle" style="width:16px; height:16px;"></span>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="fw-bold mb-1" style="font-family:var(--font-head); color:var(--color-text);">Sharma Auto Garage</h5>
                                <div class="d-flex align-items-center gap-2 text-muted" style="font-size:13px;">
                                    <span class="text-warning fw-bold" style="font-size:14px;">★ 4.8</span>
                                    <span>•</span>
                                    <span>1.2 km away</span>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <button class="btn btn-outline-dark w-100 rounded-pill py-3 fw-bold d-flex align-items-center justify-content-center gap-2 shadow-sm">
                                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                                    Call Mechanic
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn text-white w-100 rounded-pill py-3 fw-bold d-flex align-items-center justify-content-center gap-2 shadow-sm" style="background:var(--color-primary);">
                                    <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                    Live Map
                                </button>
                            </div>
                        </div>

                        <button class="btn btn-light text-danger w-100 rounded-pill py-2 fw-medium" style="font-size:14px;">
                            Cancel SOS Request
                        </button>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/bootstrap.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Bookings - GarageNearMe</title>
  <link rel="stylesheet" href="../css/bootstrap.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mechanic.css?v=09ad5548" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
  <style>
    .request-card {
      transition: all 0.2s ease;
      border: 1px solid var(--color-border);
    }
    .request-card:hover {
      border-color: rgba(255,107,53,0.3);
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transform: translateY(-2px);
    }
    .sos-card {
      border-left: 4px solid #EF4444;
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.03) 0%, white 100%);
    }
    .pulse-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .filter-btn.active {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }
  </style>
</head>

<body>

  <div class="mechanic-layout">
    <div id="sidebar-container"></div>

    <!-- Overlay for mobile sidebar -->
    <div class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-none z-3" id="sidebarOverlay" style="z-index: 1030;"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="mechanic-main">
      <div id="topbar-container"></div>

      <!-- Content Area -->
      <div class="mechanic-content">
        
        <!-- Filters -->
        <div class="d-flex flex-wrap gap-2 mb-4">
          <button class="btn btn-outline-secondary filter-btn active rounded-pill px-4">All Bookings (2)</button>
          <button class="btn btn-outline-secondary filter-btn rounded-pill px-4">New Bookings <span class="badge bg-primary ms-1 rounded-pill">1</span></button>
          <button class="btn btn-outline-secondary filter-btn rounded-pill px-4">In Progress</button>
        </div>

        <!-- Request Cards Grid -->
        <div class="row g-4">
          


          <!-- Normal Booking Card (Pending) -->
          <div class="col-12 col-xl-6">
            <div class="bg-white rounded-4 p-4 request-card h-100 d-flex flex-column">
              
              <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-2 py-1">New Booking</span>
                <span class="text-muted small">10 mins ago</span>
              </div>

              <div class="row align-items-center mb-4">
                <div class="col-sm-8 mb-3 mb-sm-0">
                  <h5 class="fw-bold mb-1">Sneha Patel</h5>
                  <div class="text-muted small mb-2 d-flex align-items-center gap-1">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
                    Hyundai i20
                  </div>
                  <div class="text-dark fw-medium small mb-1">
                    <span class="text-muted">Service:</span> General Service + Oil Change
                  </div>
                  <div class="text-dark fw-medium small">
                    <span class="text-muted">Time:</span> Today, 4:00 PM
                  </div>
                </div>
                <div class="col-sm-4 text-sm-end text-start">
                  <div class="fw-bold" style="font-size: 1.2rem; color: var(--color-success);">₹1,800</div>
                  <div class="text-muted" style="font-size: 11px;">Est. Earning</div>
                </div>
              </div>

              <div class="d-flex gap-2 mt-auto">
                <a href="job-detail.html" class="btn text-white flex-grow-1 fw-bold rounded-pill" style="background: var(--color-primary); text-decoration: none; text-align: center;">Accept Booking</a>
                <button class="btn btn-outline-secondary rounded-pill px-4">Decline</button>
              </div>
            </div>
          </div>

          <!-- Accepted Booking (In Progress) -->
          <div class="col-12 col-xl-6">
            <div class="bg-white rounded-4 p-4 request-card h-100 d-flex flex-column border-success border-opacity-50">
              
              <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-2 py-1">In Progress</span>
                <span class="text-muted small">Accepted 2 hrs ago</span>
              </div>

              <div class="mb-4">
                <h5 class="fw-bold mb-1">Amit Shah</h5>
                <div class="text-muted small mb-2 d-flex align-items-center gap-1">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.5 1h-8C6.12 1 5 2.12 5 3.5v17C5 21.88 6.12 23 7.5 23h8c1.38 0 2.5-1.12 2.5-2.5v-17C18 2.12 16.88 1 15.5 1zm-4 21c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4.5-4H7V4h9v14z"/></svg>
                  Contact: +91 98765 43210
                </div>
                <div class="text-dark fw-medium small mb-1">
                  <span class="text-muted">Service:</span> AC Gas Refill
                </div>
                <div class="text-dark fw-medium small">
                  <span class="text-muted">Vehicle Drop-off:</span> Customer dropped at garage
                </div>
              </div>

              <div class="d-flex gap-2 mt-auto">
                <a href="job-detail.html" class="btn btn-success flex-grow-1 fw-bold rounded-pill text-white">Mark as Completed</a>
                <button class="btn btn-outline-primary rounded-pill px-4">Call Customer</button>
              </div>
            </div>
          </div>

        </div>

      </div>
    </main>

  </div>

  <script src="../js/mechanic-auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/bootstrap.js"></script>
  <script>
    initMechanicChrome('Normal Bookings');
    
    // Simple filter toggle effect
    const filters = document.querySelectorAll('.filter-btn');
    filters.forEach(btn => {
      btn.addEventListener('click', () => {
        filters.forEach(f => f.classList.remove('active', 'btn-outline-secondary'));
        filters.forEach(f => {
          if(f !== btn) f.classList.add('btn-outline-secondary');
        });
        btn.classList.add('active');
        btn.classList.remove('btn-outline-secondary');
      });
    });
  </script>
</body>

</html>

<header class="mechanic-topbar">
  <button class="btn d-lg-none p-0 border-0 shadow-none text-dark" id="sidebarToggle">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>

  <div class="d-none d-lg-block">
    <h5 class="mb-0 fw-bold" id="topbar-title" style="font-family: var(--font-head);">Overview</h5>
  </div>

  <div class="d-flex align-items-center gap-3 ms-auto">
    <!-- Notification Bell -->
    <div class="position-relative cursor-pointer" style="cursor: pointer;">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--color-text-muted)"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
    </div>

    <!-- User Profile -->
    <div class="d-flex align-items-center gap-2 border-start ps-3 ms-1">
      <div class="rounded-circle bg-light d-flex align-items-center justify-content-center fw-bold" style="width: 36px; height: 36px; color: var(--color-primary); font-size: 14px;">
        SA
      </div>
      <div class="d-none d-md-block">
        <div class="fw-bold" style="font-size: 14px; line-height: 1.2;">Sharma Auto</div>
        <div class="text-muted" style="font-size: 12px;">Partner</div>
      </div>
    </div>
  </div>
</header>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Catalog - GarageNearMe</title>
  <link rel="stylesheet" href="../css/bootstrap.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/mechanic.css?v=241d7e8f" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
</head>

<body>

  <div class="mechanic-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <div id="sidebar-container"></div>

    <!-- Overlay for mobile sidebar -->
    <div class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-none z-3" id="sidebarOverlay"
      style="z-index: 1030;"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="mechanic-main">

      <!-- Topbar -->
      <div id="topbar-container"></div>

      <!-- Content Area -->
      <div class="mechanic-content">
        <div class="d-flex justify-content-end mb-4">

          <button class="btn text-white rounded-pill px-4 fw-bold shadow-sm" style="background: var(--color-primary);"
            data-bs-toggle="modal" data-bs-target="#addServiceModal">
            + Add New Service
          </button>

        </div>
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
          <div>
            <p class="text-muted mb-0">Manage the services you offer and set base pricing.</p>
          </div>
          <!-- Mobile only add button -->
          <button class="btn text-white rounded-pill px-4 fw-bold shadow-sm d-sm-none"
            style="background: var(--color-primary);" data-bs-toggle="modal" data-bs-target="#addServiceModal">
            + Add New Service
          </button>
          <div class="position-relative" style="max-width: 300px; width: 100%;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--color-text-muted)"
              class="position-absolute top-50 translate-middle-y ms-3">
              <path
                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" class="form-control rounded-pill ps-5 bg-white border" placeholder="Search services...">
          </div>
        </div>

        <!-- Services Table -->
        <div class="bg-white rounded-4 border shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-light">
                <tr>
                  <th scope="col" class="fw-semibold text-muted py-3 ps-4 border-bottom">Service Name</th>
                  <th scope="col" class="fw-semibold text-muted py-3 border-bottom">Category</th>
                  <th scope="col" class="fw-semibold text-muted py-3 border-bottom">Base Price</th>
                  <th scope="col" class="fw-semibold text-muted py-3 border-bottom text-center">Status</th>
                  <th scope="col" class="fw-semibold text-muted py-3 pe-4 border-bottom text-end">Actions</th>
                </tr>
              </thead>
              <tbody class="border-top-0" id="servicesTableBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- Add Service Modal -->
  <div class="modal fade" id="addServiceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold" style="font-family: var(--font-head);">Add New Service</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addServiceForm">
            <div class="mb-3">
              <label class="form-label text-muted small fw-medium mb-1">Service Name</label>
              <input type="text" class="form-control" id="serviceName" placeholder="e.g. Wheel Balancing">
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small fw-medium mb-1">Category</label>
              <select class="form-select" id="serviceCategory">
                <option value="" selected disabled>Select Category</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Repair">Repair</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Emergency">Emergency</option>
                <option value="Denting & Painting">Denting & Painting</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small fw-medium mb-1">Base Price (₹)</label>
              <input type="number" class="form-control" id="servicePrice" placeholder="e.g. 500">
            </div>

            <div class="mb-4">
              <label class="form-label text-muted small fw-medium mb-1">Short Description (Optional)</label>
              <textarea class="form-control" rows="2" id="serviceDescription"
                placeholder="Briefly describe what's included..."></textarea>
            </div>

            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" role="switch" id="activeStatus" checked>
              <label class="form-check-label ms-2 text-dark" for="activeStatus">Mark as Active immediately</label>
            </div>

            <button type="submit" class="btn w-100 text-white fw-bold py-2 rounded-pill shadow-sm"
              style="background: var(--color-primary);">
              Save Service
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script>
    Promise.all([
      loadComponent('sidebar-container', 'components/sidebar.html?v=' + new Date().getTime(), setActiveSidebarLink),
      loadComponent('topbar-container', 'components/topbar.html?v=' + new Date().getTime(), () => {
        const titleEl = document.getElementById('topbar-title');
        if (titleEl) titleEl.textContent = 'Overview';
      })
    ]).then(() => {
      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      function toggleSidebar() {
        if (sidebar) sidebar.classList.toggle('show');
        if (sidebarOverlay) sidebarOverlay.classList.toggle('d-none');
      }
      if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
      if (sidebarOverlay) sidebarOverlay.addEventListener('click', toggleSidebar);
      checkLocationSet();
      async function checkLocationSet() {
        const token = localStorage.getItem('garage_token');
        if (!token) { window.location.href = 'index.html'; return; }
        try {
          const res = await fetch('http://localhost:8000/api/garage-auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (!res.ok) { window.location.href = 'index.html'; return; }
          const garage = await res.json();
          const loc = garage.location;
          if (!loc || !loc.latitude || !loc.longitude) {
            window.location.href = 'set-location.html';
          }
        } catch { /* silent */ }
      }
    });
  </script>
  <script src="../js/bootstrap.js"></script>
  <script>

    const API = 'http://localhost:8000';

    const addServiceForm =
      document.getElementById('addServiceForm');

    if (addServiceForm) {

      addServiceForm.addEventListener(
        'submit',
        async function (e) {

          e.preventDefault();

          const token =
            localStorage.getItem('garage_token');

          const serviceName =
            document.getElementById('serviceName').value;

          const servicePrice =
            document.getElementById('servicePrice').value;

          const serviceCategory =
            document.getElementById('serviceCategory').value;

          try {

            const response = await fetch(
              `${API}/api/garage/me/services`,
              {
                method: 'POST',

                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${token}`
                },

                body: JSON.stringify({
                  service_name: serviceName,
                  category: serviceCategory,
                  price: Number(servicePrice),
                  is_available: true
                })
              }
            );

            if (!response.ok) {

              const error =
                await response.json();

              console.error(error);

              alert('Failed to add service');

              return;
            }

            // Reload table
            loadServices();

            // Reset form
            addServiceForm.reset();

            // Close modal
            const modalElement =
              document.getElementById('addServiceModal');

            const modal =
              bootstrap.Modal.getInstance(modalElement);

            if (modal) {
              modal.hide();
            }

            alert('Service added successfully');

          } catch (err) {

            console.error(err);

            alert('Server error');

          }

        }
      );

    }
    // ─────────────────────────────
    // LOAD SERVICES
    // ─────────────────────────────

    async function loadServices() {

      const token = localStorage.getItem('garage_token');

      if (!token) {
        window.location.href = 'index.html';
        return;
      }

      try {

        const response = await fetch(
          `${API}/api/garage/me/services`,
          {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          }
        );

        if (!response.ok) {
          throw new Error('Failed to load services');
        }

        const services = await response.json();

        console.log('Services:', services);

        renderServices(services);

      } catch (err) {

        console.error(err);
        renderServices([]);

        const tableBody =
          document.getElementById('servicesTableBody');

        tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center py-5 text-muted">
          Unable to load services. Please restart the backend and try again.
        </td>
      </tr>
    `;

      }

    }


    // ─────────────────────────────
    // RENDER SERVICES
    // ─────────────────────────────

    function renderServices(services) {

      const tableBody =
        document.getElementById('servicesTableBody');

      tableBody.innerHTML = '';

      // Empty state
      if (services.length === 0) {

        tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center py-5 text-muted">
          No services added yet.
        </td>
      </tr>
    `;

        return;
      }

      services.forEach(service => {

        tableBody.innerHTML += `

      <tr>

        <td class="ps-4 py-3">
          <div class="fw-bold text-dark">
            ${service.service_name}
          </div>

          <div class="text-muted small">
            Garage Service
          </div>
        </td>

        <td>
          <span class="badge bg-primary bg-opacity-10 text-primary border rounded-pill">
            ${service.category || 'General'}
          </span>
        </td>

        <td>
          <div class="fw-bold">
            ₹${service.price}
          </div>

          <div class="text-muted small">
            Base Price
          </div>
        </td>

        <td class="text-center">

          <div class="form-check form-switch d-inline-block m-0">

            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              ${service.is_available ? 'checked' : ''}
              onchange="toggleService(${service.id}, this.checked)"
            >

          </div>

        </td>

        <td class="pe-4 text-end">

          <button
            class="btn btn-sm btn-light border rounded-circle p-2 me-1 text-primary"
            title="Edit"
            onclick="window.location.href = 'edit-service.html?id=${service.id}'"
          >

            <svg viewBox="0 0 24 24"
                 width="16"
                 height="16"
                 fill="currentColor">

              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>

            </svg>

          </button>

          <button
            class="btn btn-sm btn-light border rounded-circle p-2 text-danger"
            title="Delete"
            onclick="deleteService(${service.id})"
          >

            <svg viewBox="0 0 24 24"
                 width="16"
                 height="16"
                 fill="currentColor">

              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>

            </svg>

          </button>

        </td>

      </tr>

    `;

      });

    }


    // ─────────────────────────────
    // DELETE SERVICE
    // ─────────────────────────────

    async function deleteService(serviceId) {

      const confirmed =
        confirm('Delete this service?');

      if (!confirmed) return;

      const token =
        localStorage.getItem('garage_token');

      try {

        const response = await fetch(
          `${API}/api/garage/me/services/${serviceId}`,
          {
            method: 'DELETE',

            headers: {
              'Authorization': `Bearer ${token}`
            }
          }
        );

        if (!response.ok) {
          throw new Error();
        }

        loadServices();

      } catch (err) {

        console.error(err);

        alert('Failed to delete service');

      }

    }


    // ─────────────────────────────
    // TOGGLE SERVICE
    // ─────────────────────────────

    async function toggleService(
      serviceId,
      isAvailable
    ) {

      const token =
        localStorage.getItem('garage_token');

      try {

        const response = await fetch(
          `${API}/api/garage/me/services/${serviceId}/toggle`,
          {
            method: 'PATCH',

            headers: {
              'Authorization': `Bearer ${token}`
            }
          }
        );

        if (!response.ok) {
          throw new Error();
        }

        console.log(
          'Service updated'
        );

      } catch (err) {

        console.error(err);

        alert('Failed to update service');

        // Reload correct state
        loadServices();

      }

    }


    // ─────────────────────────────
    // INIT
    // ─────────────────────────────

    loadServices();

  </script>
</body>

</html>

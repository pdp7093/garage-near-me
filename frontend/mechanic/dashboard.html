<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechanic Dashboard - GarageNearMe</title>
  <link rel="manifest" href="/mechanic/manifest.json">
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="/css/bootstrap.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/mechanic.css?v=8671a53d" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
</head>

<body>

  <div class="mechanic-layout">

    <!-- SIDEBAR COMPONENT -->
    <div id="sidebar-container"></div>

    <!-- Overlay for mobile sidebar -->
    <div class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-none z-3" id="sidebarOverlay"
      style="z-index: 1030;"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="mechanic-main">

      <!-- Topbar -->
      <!-- TOPBAR COMPONENT -->
      <div id="topbar-container"></div>

      <!-- Content Area -->
      <div class="mechanic-content">

        <!-- Welcome & SOS Toggle -->
        <div class="sos-toggle-wrapper mb-4">
          <div>
            <h4 class="fw-bold mb-1" style="font-family: var(--font-head);" id="garageName">Welcome back</h4>
            <p class="text-muted mb-0 small" id="garageMetaInfo">You have 2 pending requests today.</p>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="text-end d-none d-sm-block">
              <div class="fw-bold text-success" id="sosStatusText">Available for SOS</div>
              <div class="text-muted" style="font-size: 12px;">Turn off if you are busy</div>
            </div>
            <div class="form-check form-switch sos-switch mb-0">
              <input class="form-check-input" type="checkbox" role="switch" id="sosToggle" checked>
            </div>
          </div>
        </div>

        <!-- Stat Cards Row -->
        <div class="row g-4 mb-4">
          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="stat-icon" style="background: rgba(255, 107, 53, 0.1); color: var(--color-primary);">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                      d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z" />
                  </svg>
                </div>
                <div class="text-muted fw-medium">Today's Earnings</div>
              </div>
              <h3 class="fw-bold mb-0" id="todaysEarningsStat">0</h3>
            </div>
          </div>

          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10B981;">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                      d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                  </svg>
                </div>
                <div class="text-muted fw-medium">Jobs Completed</div>
              </div>
              <h3 class="fw-bold mb-0" id="jobsCompletedStat">0</h3>
            </div>
          </div>

          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: #EF4444;">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                      d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                  </svg>
                </div>
                <div class="text-muted fw-medium">SOS Completed</div>
              </div>
              <h3 class="fw-bold mb-0 text-danger" id="activeSOSStat">0</h3>
            </div>
          </div>

          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #F59E0B;">
                  <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                      d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                  </svg>
                </div>
                <div class="text-muted fw-medium">Customer Rating</div>
              </div>
              <h3 class="fw-bold mb-0" id="customerRatingStat">0</h3>
            </div>
          </div>
        </div>

        <!-- Recent Activity Table -->
        <div class="bg-white rounded-4 border p-4 shadow-sm">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0" style="font-family: var(--font-head);">Recent Bookings</h5>
            <a href="bookings.html" class="btn btn-sm btn-outline-primary rounded-pill px-3">View All Bookings</a>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="text-muted small">
                <tr>
                  <th scope="col" class="fw-medium pb-3 border-bottom">Customer</th>
                  <th scope="col" class="fw-medium pb-3 border-bottom">Service Type</th>
                  <th scope="col" class="fw-medium pb-3 border-bottom">Location/Distance</th>
                  <th scope="col" class="fw-medium pb-3 border-bottom">Status</th>
                  <th scope="col" class="fw-medium pb-3 border-bottom text-end">Action</th>
                </tr>
              </thead>
              <tbody class="border-top-0" id="recentBookingsBody">
                <tr>
                  <td colspan="5" class="text-center text-muted py-4">Loading recent bookings...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="/js/config.js"></script>
  <script src="/js/mechanic-auth.js"></script>
  <script src="/js/components.js?v=2"></script>
  <script src="/js/sos-notification-handler.js"></script>
  <script>
    initMechanicChrome('Overview', mechanicCheckLocationSet);
  </script>
  <script src="/js/bootstrap.js"></script>
  <script>

    const API = getApiBase();
    let garageBaseMeta = '';
    let pendingTodayCount = null;


    // ─────────────────────────────────────
    // LOAD DASHBOARD DATA
    // ─────────────────────────────────────

    async function loadGarageDashboard() {

      const token = localStorage.getItem('garage_token');

      // Agar token nahi hai → login page
      if (!token) {
        window.location.href = 'index.html';
        return;
      }

      try {

        // Garage profile fetch
        const response = await fetch(`${API}/garage/me`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        // Invalid token
        if (!response.ok) {

          localStorage.removeItem('garage_token');

          window.location.href = 'index.html';

          return;
        }

        // JSON response
        const garage = await response.json();

        console.log('Garage Data:', garage);

        // ─────────────────────────
        // WELCOME SECTION
        // ─────────────────────────

        document.getElementById('garageName').innerText =
          `Welcome back, ${garage.name}`;


        // ─────────────────────────
        // META INFO
        // ─────────────────────────

        const city =
          garage.location?.city || 'Location not set';

        const garageType =
          garage.garage_type || 'Garage';

        garageBaseMeta =
          `${garage.owner_name} • ${city} • ${garageType}`;

        renderGarageMeta();


        // ─────────────────────────
        // SOS TOGGLE
        // ─────────────────────────

        const sosToggle =
          document.getElementById('sosToggle');

        sosToggle.checked =
          garage.is_sos_available;

        updateSOSUI(
          garage.is_sos_available
        );

      } catch (err) {

        console.error('Dashboard Error:', err);

      }

    }


    // ─────────────────────────────────────
    // UPDATE SOS UI
    // ─────────────────────────────────────

    function updateSOSUI(isEnabled) {

      const sosStatusText =
        document.getElementById('sosStatusText');

      if (isEnabled) {

        sosStatusText.textContent =
          'Available for SOS';

        sosStatusText.className =
          'fw-bold text-success';

      } else {

        sosStatusText.textContent =
          'Offline';

        sosStatusText.className =
          'fw-bold text-muted';

      }

    }


    // ─────────────────────────────────────
    // SOS TOGGLE SAVE
    // ─────────────────────────────────────

    document.getElementById('sosToggle')
      .addEventListener('change', async (e) => {

        const token =
          localStorage.getItem('garage_token');

        try {

          const response = await fetch(
            `${API}/garage/me`,
            {
              method: 'PATCH',

              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },

              body: JSON.stringify({
                is_sos_available: e.target.checked
              })
            }
          );

          if (!response.ok) {
            throw new Error();
          }

          // UI update
          updateSOSUI(
            e.target.checked
          );

        } catch (err) {

          console.error(err);

          alert('Failed to update SOS status');

        }

      });


    // ─────────────────────────────────────
    // AUTO-REFRESH INTERVALS
    // ─────────────────────────────────────

    let summaryRefreshInterval;
    let bookingsRefreshInterval;
    let garageRefreshInterval;

    function startAutoRefresh() {
      // Stats refresh every 15 seconds
      summaryRefreshInterval = setInterval(loadDashboardSummary, 15000);

      // Recent bookings refresh every 10 seconds
      bookingsRefreshInterval = setInterval(loadRecentBookings, 10000);

      // Garage profile refresh every 60 seconds
      garageRefreshInterval = setInterval(loadGarageDashboard, 60000);
    }

    function stopAutoRefresh() {
      clearInterval(summaryRefreshInterval);
      clearInterval(bookingsRefreshInterval);
      clearInterval(garageRefreshInterval);
    }

    // Stop refresh if user leaves the page
    window.addEventListener('beforeunload', stopAutoRefresh);
    window.addEventListener('pagehide', stopAutoRefresh);

    // ─────────────────────────────────────
    // INIT
    // ─────────────────────────────────────

    loadGarageDashboard();
    loadDashboardSummary();
    loadRecentBookings();
    startAutoRefresh();

    // Mechanic is now on the dashboard — stop any lingering SW notification loops
    if (typeof stopAllSOSLoops === 'function') {
      navigator.serviceWorker?.ready.then(() => stopAllSOSLoops());
    }

    async function loadDashboardSummary() {

      const token = localStorage.getItem('garage_token');

      if (!token) {
        return;
      }

      try {

        const response = await fetch(
          `${API}/garage/dashboard-summary`,
          {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          }
        );

        if (!response.ok) {
          throw new Error();
        }

        const data = await response.json();

        console.log('Dashboard Summary:', data);

        document.getElementById('todaysEarningsStat').innerText =
          `₹${Number(data.todays_earnings || 0).toLocaleString('en-IN')}`;

        document.getElementById('jobsCompletedStat').innerText =
          data.jobs_completed;

        document.getElementById('activeSOSStat').innerText =
          data.sos_completed;

        document.getElementById('customerRatingStat').innerText =
          data.customer_rating ?? 'N/A';

      } catch (err) {

        console.error(err);

      }

    }

    async function loadRecentBookings() {

      const token = localStorage.getItem('garage_token');

      if (!token) {
        return;
      }

      const tbody = document.getElementById('recentBookingsBody');

      try {

        const response = await fetch(
          `${API}/bookings/garage/all`,
          {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          }
        );

        if (!response.ok) {
          throw new Error();
        }

        const bookings = await response.json();
        const latestBookings = bookings
          .slice()
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
          .slice(0, 5);

        updatePendingMeta(bookings);

        if (latestBookings.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" class="text-center text-muted py-4">Abhi koi booking nahi hai.</td>
            </tr>`;
          return;
        }

        tbody.innerHTML = latestBookings.map(buildRecentBookingRow).join('');

      } catch (err) {

        console.error('Recent bookings error:', err);

        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="text-center text-danger py-4">
              Recent bookings load nahi hue.
            </td>
          </tr>`;

      }

    }

    function buildRecentBookingRow(booking) {

      const customerName =
        escapeHTML(booking.customer_name || `Customer #${booking.customer_id}`);

      const vehicleInfo =
        escapeHTML([booking.vehicle_model || vehicleTypeLabel(booking.vehicle_type), booking.vehicle_number]
          .filter(Boolean)
          .join(' • ') || 'Vehicle details pending');

      const serviceName =
        escapeHTML(booking.service_type || (booking.booking_type === 'sos' ? 'SOS Assistance' : 'General Service'));

      const location =
        escapeHTML(shortAddress(booking.pickup_address || booking.customer_address || 'Location not shared'));

      const timeSource =
        booking.scheduled_at || booking.created_at;

      const timeLabel =
        formatDateTime(timeSource);

      const status =
        statusConfig(booking.status);

      return `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2 mb-1">
              <span class="badge bg-light text-dark border px-2 py-1 rounded-pill small font-monospace">${booking.booking_number || ('BK-' + booking.id)}</span>
              <div class="fw-bold text-dark">${customerName}</div>
            </div>
            <div class="text-muted small">${vehicleInfo}</div>
          </td>
          <td>
            <span class="badge bg-light text-dark border px-2 py-1 rounded-pill">
              ${serviceName}
            </span>
          </td>
          <td>
            <div class="text-dark">${location}</div>
            <div class="text-muted small">${timeLabel}</div>
          </td>
          <td>
            <span class="${status.className} fw-bold small">${escapeHTML(status.label)}</span>
          </td>
          <td class="text-end">
            <a href="job-detail.html?id=${booking.id}" class="btn btn-outline-primary btn-sm rounded-pill px-3 shadow-sm">
              View Details
            </a>
          </td>
        </tr>`;

    }

    function updatePendingMeta(bookings) {

      if (!bookings.length) {
        pendingTodayCount = 0;
        renderGarageMeta();
        return;
      }

      const today = new Date().toDateString();
      pendingTodayCount = bookings.filter((booking) =>
        booking.status === 'pending' &&
        new Date(booking.created_at).toDateString() === today
      ).length;

      renderGarageMeta();

    }

    function renderGarageMeta() {

      const metaEl = document.getElementById('garageMetaInfo');

      if (!metaEl) {
        return;
      }

      const baseMeta = garageBaseMeta || 'Garage details loading';

      if (pendingTodayCount === null) {
        metaEl.textContent = baseMeta;
        return;
      }

      metaEl.textContent =
        `${pendingTodayCount} pending request${pendingTodayCount === 1 ? '' : 's'} today • ${baseMeta}`;

    }

    function statusConfig(status) {

      const config = {
        pending: { label: 'Pending', className: 'text-primary' },
        accepted: { label: 'Accepted', className: 'text-success' },
        ongoing: { label: 'In Progress', className: 'text-warning' },
        completed: { label: 'Completed', className: 'text-success' },
        rejected: { label: 'Rejected', className: 'text-danger' },
        cancelled: { label: 'Cancelled', className: 'text-muted' }
      };

      return config[status] || { label: status || 'Unknown', className: 'text-muted' };

    }

    function formatDateTime(value) {

      if (!value) {
        return 'Time not set';
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return 'Time not set';
      }

      return date.toLocaleString('en-IN', {
        day: 'numeric',
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });

    }

    function vehicleTypeLabel(type) {

      if (type === 'two_wheeler') {
        return '2 Wheeler';
      }

      if (type === 'four_wheeler') {
        return '4 Wheeler';
      }

      return type || '';

    }

    function shortAddress(address) {

      return String(address)
        .split(',')
        .slice(0, 2)
        .join(',')
        .trim();

    }

    function escapeHTML(value) {

      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));

    }
  </script>
</body>

</html>

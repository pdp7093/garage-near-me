<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Garage - Admin | GarageNearMe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="../css/bootstrap.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    .add-page-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .page-action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      overflow: hidden;
    }

    .form-card-head {
      background: #1B1F2E;
      color: #fff;
      padding: 1.25rem 1.5rem;
    }

    .form-card-head h5 {
      font-family: var(--font-head);
    }

    .form-card-body {
      padding: 1.5rem;
    }

    .section-kicker {
      font-size: 0.72rem;
      font-weight: 700;
      color: #6B7280;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .gnm-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
      display: block;
    }

    .gnm-input {
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 0.85rem;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
      color: #1B1F2E;
    }

    .gnm-input:focus {
      border-color: #FF6B35;
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    }

    .phone-prefix {
      padding: 8px 10px;
      background: #F3F4F6;
      border: 1.5px solid #E5E7EB;
      border-right: none;
      border-radius: 8px 0 0 8px;
      font-size: 0.85rem;
      color: #374151;
    }

    .phone-input {
      border-radius: 0 8px 8px 0;
      border-left: none;
    }

    .form-divider {
      height: 1px;
      background: #F1F5F9;
      margin: 1.5rem 0;
    }

    .sticky-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #E5E7EB;
      background: #FAFAFA;
    }

    @media (max-width: 575.98px) {
      .page-action-row,
      .sticky-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .sticky-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>

    <main class="admin-content">
      <div id="topbar-container"></div>

      <div class="add-page-shell">
        <div class="page-action-row">
          <a href="garages.html" class="btn btn-light rounded-pill px-3 fw-medium border d-inline-flex align-items-center gap-2">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            Back to Garages
          </a>
        </div>

        <form class="form-card mb-5" id="addGarageForm" novalidate>
          <div class="form-card-head">
            <h5 class="fw-bold mb-1">Add New Garage</h5>
            <p class="small mb-0" style="color:rgba(255,255,255,0.62);">Admin direct onboard - creates a live garage account.</p>
          </div>

          <div class="form-card-body">
            <div class="section-kicker">Owner Details</div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="gnm-label" for="ag-owner">Owner Name *</label>
                <input class="gnm-input" id="ag-owner" placeholder="Ramesh Sharma" autocomplete="name">
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-phone">Phone *</label>
                <div class="d-flex">
                  <span class="phone-prefix">+91</span>
                  <input class="gnm-input phone-input" id="ag-phone" placeholder="9876543210" maxlength="10"
                    inputmode="numeric" autocomplete="tel">
                </div>
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-email">Email</label>
                <input class="gnm-input" id="ag-email" type="email" placeholder="owner@example.com" autocomplete="email">
              </div>
            </div>

            <div class="form-divider"></div>

            <div class="section-kicker">Garage Details</div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="gnm-label" for="ag-type">Garage Type *</label>
                <select class="gnm-input" id="ag-type">
                  <option value="">-- Select --</option>
                  <option value="four_wheeler">Car Specialist</option>
                  <option value="two_wheeler">Bike Specialist</option>
                  <option value="both">Car & Bike</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-name">Garage Name *</label>
                <input class="gnm-input" id="ag-name" placeholder="Sharma Auto Works" autocomplete="organization">
              </div>
              <div class="col-12">
                <label class="gnm-label" for="ag-addr">Street Address *</label>
                <input class="gnm-input" id="ag-addr" placeholder="Shop 12, Sindhi Market" autocomplete="street-address">
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-city">City *</label>
                <input class="gnm-input" id="ag-city" value="Ahmedabad" autocomplete="address-level2">
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-pin">Pincode *</label>
                <input class="gnm-input" id="ag-pin" placeholder="380001" maxlength="6" inputmode="numeric"
                  autocomplete="postal-code">
              </div>
              <div class="col-md-6 d-flex align-items-center mt-4">
                <div class="form-check form-switch mb-0">
                  <input class="form-check-input" type="checkbox" role="switch" id="ag-has-gst">
                  <label class="form-check-label gnm-label mb-0 ms-1" style="font-size: 0.85rem;" for="ag-has-gst">GST Registered</label>
                </div>
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-gst-num">GST Number</label>
                <input class="gnm-input" id="ag-gst-num" placeholder="Enter GST Number" disabled>
              </div>
            </div>

            <div class="form-divider"></div>

            <div class="section-kicker">Verification Documents</div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="gnm-label" for="ag-doc-aadhar">Upload Aadhar / PAN *</label>
                <input type="file" class="gnm-input bg-light" id="ag-doc-aadhar" accept="image/*,.pdf">
              </div>
              <div class="col-md-6">
                <label class="gnm-label" for="ag-doc-license">Upload Shop License (Optional)</label>
                <input type="file" class="gnm-input bg-light" id="ag-doc-license" accept="image/*,.pdf">
              </div>
            </div>

            <div class="alert alert-danger small rounded-3 mt-3 py-2 px-3 d-none" id="ag-err"></div>
            <div class="alert alert-success small rounded-3 mt-3 py-2 px-3 d-none" id="ag-success"></div>
          </div>

          <div class="sticky-actions">
            <a href="garages.html" class="btn btn-light rounded-pill px-4 fw-medium border">Cancel</a>
            <button type="submit" class="btn btn-admin-primary rounded-pill px-4 fw-bold" id="ag-submit">
              <span class="spinner-border spinner-border-sm me-1 d-none" id="ag-sp"></span>
              Onboard Garage
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/config.js"></script>
  <script>
    initAdminChrome('Add New Garage Partner', () => {
      const garageLink = document.querySelector('.admin-nav-link[href="garages.html"]');
      if (garageLink) garageLink.classList.add('active');
    });

    document.getElementById('ag-has-gst').addEventListener('change', function() {
      const gstInput = document.getElementById('ag-gst-num');
      gstInput.disabled = !this.checked;
      if (!this.checked) gstInput.value = '';
    });
  </script>
  <script src="../js/bootstrap.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:8000';
    const AKEY = 'gnm_admin_secret_2026';

    async function adminApi(url, method = 'POST', body = null) {
      const opts = {
        method,
        headers: { 'X-Admin-Key': AKEY }
      };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      return fetch(API + url, opts);
    }

    async function ensureOk(response, fallbackMessage) {
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.detail || fallbackMessage);
      }
      return response;
    }

    async function uploadGarageDocument(garageId, documentType, file) {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(`${API}/api/garage-requests/admin/${garageId}/documents?document_type=${encodeURIComponent(documentType)}`, {
        method: 'POST',
        headers: { 'X-Admin-Key': AKEY },
        body: fd
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || 'Document upload failed.');
      }
    }

    function setMessage(type, message) {
      const errEl = document.getElementById('ag-err');
      const successEl = document.getElementById('ag-success');
      errEl.classList.add('d-none');
      successEl.classList.add('d-none');

      const target = type === 'success' ? successEl : errEl;
      target.textContent = message;
      target.classList.remove('d-none');
    }

    document.getElementById('addGarageForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      const owner = document.getElementById('ag-owner').value.trim();
      const phone = document.getElementById('ag-phone').value.trim();
      const email = document.getElementById('ag-email').value.trim();
      const type = document.getElementById('ag-type').value;
      const name = document.getElementById('ag-name').value.trim();
      const addr = document.getElementById('ag-addr').value.trim();
      const city = document.getElementById('ag-city').value.trim();
      const pin = document.getElementById('ag-pin').value.trim();
      const hasGst = document.getElementById('ag-has-gst').checked;
      const gstNum = document.getElementById('ag-gst-num').value.trim();
      const aadharFile = document.getElementById('ag-doc-aadhar').files[0];
      const licenseFile = document.getElementById('ag-doc-license').files[0];

      if (!owner || !phone || !type || !name || !addr || !city || !pin || !aadharFile) {
        setMessage('error', 'Please fill all required fields and upload Aadhar.');
        return;
      }
      if (!/^\d{10}$/.test(phone)) {
        setMessage('error', 'Enter valid 10-digit phone.');
        return;
      }
      if (!/^\d{6}$/.test(pin)) {
        setMessage('error', 'Enter valid 6-digit pincode.');
        return;
      }

      const submitBtn = document.getElementById('ag-submit');
      const spinner = document.getElementById('ag-sp');
      submitBtn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const createRes = await fetch(`${API}/api/garage-requests/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            owner_name: owner,
            garage_name: name,
            phone,
            email: email || null,
            garage_type: type,
            address: addr,
            city,
            pincode: pin,
            has_gst: hasGst,
            gst_number: hasGst ? (gstNum || null) : null
          })
        });
        if (!createRes.ok) {
          const err = await createRes.json().catch(() => ({}));
          throw new Error(err.detail || 'Could not create garage request.');
        }

        const request = await createRes.json();
        const requestId = request.id;

        await ensureOk(
          await adminApi(`/api/garage-requests/admin/${requestId}/start-review`),
          'Could not start admin review.'
        );

        const today = new Date().toISOString().split('T')[0];
        await ensureOk(
          await adminApi(`/api/garage-requests/admin/${requestId}/schedule-visit`, 'POST', {
            visit_date: today,
            visit_notes: 'Admin direct onboard - field visit waived'
          }),
          'Could not schedule verification.'
        );

        await ensureOk(
          await adminApi(`/api/garage-requests/admin/${requestId}/complete-verification`, 'POST', {
            is_site_verified: true,
            is_documents_verified: true,
            verification_notes: 'Admin verified directly'
          }),
          'Could not complete verification.'
        );

        const approveRes = await ensureOk(
          await adminApi(`/api/garage-requests/admin/${requestId}/approve`),
          'Could not approve garage.'
        );

        const garageLive = await approveRes.json();
        const newGarageId = garageLive.id;

        await uploadGarageDocument(newGarageId, 'aadhar', aadharFile);
        if (licenseFile) {
          await uploadGarageDocument(newGarageId, 'shop_license', licenseFile);
        }

        setMessage('success', `${name} is now live with documents uploaded. Redirecting to garages...`);
        setTimeout(() => {
          window.location.href = 'garages.html';
        }, 900);
      } catch (error) {
        setMessage('error', error.message || 'Network error. Try again.');
        submitBtn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>

</html>

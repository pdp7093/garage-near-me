<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Administrators - Admin | GarageNearMe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="../css/bootstrap.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="admin-layout">
    <div id="sidebar-container"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="admin-content">
      <div id="topbar-container"></div>

      <!-- Page Header & Actions -->
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
          <h5 class="fw-bold mb-1">Administrative Staff</h5>
          <div class="text-muted small">Manage authorized administrators and platform moderators</div>
        </div>

        <button type="button" class="btn btn-admin-primary rounded-pill px-4 d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#addAdminModal">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          Add New Admin
        </button>
      </div>

      <div id="alertBox" class="alert d-none rounded-3 mb-4" role="alert"></div>

      <!-- Main Table Card -->
      <div class="bg-white rounded-4 border shadow-sm overflow-hidden mb-4">
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Administrator Email</th>
                <th>Access Role</th>
                <th>Account Created</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="adminsTableBody">
              <tr>
                <td colspan="4" class="text-center py-4">
                  <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                  <span class="ms-2 text-muted">Retrieving administrative directory...</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Admin Glassmorphic Modal -->
  <div class="modal fade" id="addAdminModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 overflow-hidden shadow-lg">
        <div class="modal-header border-0 bg-dark text-white p-4">
          <div>
            <h5 class="modal-title fw-bold" style="font-family: var(--font-head);">Add Administrative Staff</h5>
            <div class="text-white-50 small mt-1">Register a secure sub-admin or platform moderator account</div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4 bg-light">
          <div id="modalAlertBox" class="alert d-none rounded-3 mb-3" role="alert"></div>
          <form id="addAdminForm">
            <div class="mb-3">
              <label class="form-label fw-semibold small text-dark">Staff Email Address</label>
              <input type="email" id="newEmailInput" class="form-control admin-input" placeholder="e.g. staff@garagenearme.com" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold small text-dark">Choose Secure Password</label>
              <input type="password" id="newPasswordInput" class="form-control admin-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-admin-primary w-100 rounded-pill py-2.5 fw-bold">
              Register New Admin
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/bootstrap.bundle.js"></script>
  <script>
    const API_BASE = "http://localhost:8000";
    
    // Authorization lock check before initializing chrome
    const adminKey = localStorage.getItem("gnm_admin_key");
    if (!adminKey) {
      window.location.href = "index.html";
    }

    initAdminChrome('Manage Admins', loadAdmins);

    function showAlert(msg, isError = true, boxId = "alertBox") {
      const box = document.getElementById(boxId);
      box.textContent = msg;
      box.className = `alert rounded-3 mb-4 ${isError ? 'alert-danger' : 'alert-success'}`;
      box.classList.remove("d-none");
    }

    // Load admin staff accounts from dynamic API
    async function loadAdmins() {
      try {
        const response = await fetch(`${API_BASE}/api/admin-auth/all`, {
          headers: {
            "X-Admin-Key": adminKey
          }
        });

        if (!response.ok) {
          if (response.status === 401 || response.status === 403) {
            localStorage.removeItem("gnm_admin_key");
            window.location.href = "index.html";
            return;
          }
          throw new Error("Failed to load administrators directory.");
        }

        const admins = await response.json();
        const tbody = document.getElementById("adminsTableBody");
        tbody.innerHTML = "";

        if (admins.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">No admin accounts registered yet.</td></tr>`;
          return;
        }

        admins.forEach((admin, index) => {
          const isSuper = index === 0; // Primary Superadmin is the first seeded or setup record
          const tr = document.createElement("tr");
          
          // Format date beautifully
          const createdDate = new Date(admin.created_at).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });

          tr.innerHTML = `
            <td>
              <div class="d-flex align-items-center gap-3">
                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold ${isSuper ? 'bg-primary text-white' : 'bg-light text-secondary'}" style="width: 40px; height: 40px;">
                  ${admin.email.charAt(0).toUpperCase()}
                </div>
                <div>
                  <div class="fw-bold text-dark fs-6">${admin.email}</div>
                </div>
              </div>
            </td>
            <td>
              <span class="badge ${isSuper ? 'bg-indigo text-indigo border-indigo' : 'bg-light text-secondary border'} px-3 py-1.5 rounded-pill fw-semibold">
                ${isSuper ? 'Super Administrator' : 'Platform Staff'}
              </span>
            </td>
            <td>
              <div class="fw-medium text-dark">${createdDate}</div>
            </td>
            <td>
              <span class="badge badge-admin-success rounded-pill px-3 py-1.5 fw-semibold">Active</span>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        showAlert(err.message || "Failed to connect to backend administrative API.", true);
      }
    }

    // Register form handler inside Modal
    document.getElementById("addAdminForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("newEmailInput").value.trim();
      const password = document.getElementById("newPasswordInput").value;

      if (password.length < 6) {
        showAlert("Password must be at least 6 characters.", true, "modalAlertBox");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/admin-auth/create`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Admin-Key": adminKey
          },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const errData = await response.json();
          showAlert(errData.detail || "Failed to register staff account.", true, "modalAlertBox");
          return;
        }

        showAlert("Administrative staff registered successfully!", false, "modalAlertBox");
        
        // Reload list and close modal
        setTimeout(() => {
          // Clear inputs
          document.getElementById("addAdminForm").reset();
          document.getElementById("modalAlertBox").classList.add("d-none");
          
          // Hide modal using bootstrap
          const modalEl = document.getElementById('addAdminModal');
          const modal = bootstrap.Modal.getInstance(modalEl);
          if (modal) modal.hide();

          loadAdmins();
        }, 1200);

      } catch (err) {
        showAlert("Error connecting to platform server.", true, "modalAlertBox");
      }
    });
  </script>
</body>
</html>

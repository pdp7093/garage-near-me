<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google-site-verification" content="oo-PKXYE2tMvJTEH0tq6-_hivJePvxok7u9f9tqAp28" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - GarageNearMe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="/css/bootstrap.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="admin-layout">
    
    <!-- SIDEBAR COMPONENT -->
    <div id="sidebar-container"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="admin-content">
      
      <!-- Topbar -->
      <!-- TOPBAR COMPONENT -->
    <div id="topbar-container"></div>

      <!-- Stats Row -->
      <div class="row g-4 mb-5">
        <div class="col-12 col-sm-6 col-xl-3">
          <div class="admin-stat-card">
            <div class="admin-stat-icon" style="background: #E0E7FF; color: var(--admin-primary);">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </div>
            <div>
              <div class="text-muted small fw-medium text-uppercase tracking-wider">Total Customers</div>
              <h3 class="fw-bold mb-0" id="statCustomers">—</h3>
              <div class="text-muted small fw-medium mt-1">Registered users</div>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="admin-stat-card">
            <div class="admin-stat-icon" style="background: #FEF3C7; color: #D97706;">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
            </div>
            <div>
              <div class="text-muted small fw-medium text-uppercase tracking-wider">Active Garages</div>
              <h3 class="fw-bold mb-0" id="statGarages">—</h3>
              <div class="text-muted small fw-medium mt-1">Verified partners</div>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="admin-stat-card border-danger border-opacity-50">
            <div class="admin-stat-icon bg-danger bg-opacity-10 text-danger position-relative">
              <span class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle" style="animation: pulse 1.5s infinite;"><span class="visually-hidden">alerts</span></span>
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div>
              <div class="text-muted small fw-medium text-uppercase tracking-wider">Pending Requests</div>
              <h3 class="fw-bold mb-0 text-danger" id="statPending">—</h3>
              <div class="text-danger small fw-medium mt-1" id="statPendingLabel">Needs attention</div>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="admin-stat-card">
            <div class="admin-stat-icon" style="background: #DCFCE7; color: #166534;">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
            </div>
            <div>
              <div class="text-muted small fw-medium text-uppercase tracking-wider">Revenue (This Month)</div>
              <h3 class="fw-bold mb-0" id="statRevenue">—</h3>
              <div class="text-success small fw-medium mt-1" id="statAllTimeRevenue">All Time: ₹—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Tables Row -->
      <div class="row g-4">

        <!-- Pending Approvals -->
        <div class="col-12 col-xl-7">
          <div class="bg-white rounded-4 border shadow-sm overflow-hidden h-100">
            <div class="p-4 border-bottom d-flex justify-content-between align-items-center">
              <h5 class="fw-bold mb-0" style="font-family: var(--font-head);">Pending Garage Approvals</h5>
              <a href="garages" class="text-decoration-none small fw-bold" style="color: var(--admin-primary);">View All</a>
            </div>
            <div class="table-responsive">
              <table class="admin-table">
                <thead>
                  <tr><th>Garage Name</th><th>Location</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="pendingTableBody">
                  <tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Recent SOS Alerts -->
        <div class="col-12 col-xl-5">
          <div class="bg-white rounded-4 border shadow-sm overflow-hidden h-100">
            <div class="p-4 border-bottom d-flex justify-content-between align-items-center bg-danger bg-opacity-10">
              <h5 class="fw-bold text-danger mb-0" style="font-family: var(--font-head);">Latest SOS Alerts</h5>
              <a href="sos-monitor" class="text-decoration-none text-danger small fw-bold">Live Monitor</a>
            </div>
            <div class="p-0" id="sosListContainer">
              <div class="text-center text-muted py-4">Loading...</div>
            </div>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="/js/components.js"></script>
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/config.js"></script>
  <script>
    initAdminChrome('Dashboard');
  </script>
  <script>
  const STATUS_BADGE = {
    pending:               'bg-warning text-dark',
    documents_pending:     'bg-info text-dark',
    under_review:          'bg-primary text-white',
    site_visit_scheduled:  'bg-secondary text-white',
    verification_completed:'bg-success text-white',
    approved:              'bg-success text-white',
    rejected:              'bg-danger text-white',
  };
  const SOS_COLOR = {
    broadcasting: 'border-danger',
    assigned:     'border-warning',
    in_progress:  'border-primary',
    completed:    'border-success',
    cancelled:    'border-secondary',
  };

  function fmtRevenue(val) {
    if (val >= 100000) return '₹' + (val / 100000).toFixed(1) + 'L';
    if (val >= 1000)   return '₹' + (val / 1000).toFixed(1) + 'K';
    return '₹' + val.toLocaleString('en-IN');
  }

  async function loadDashboardStats() {
    const adminKey = localStorage.getItem('gnm_admin_key');
    if (!adminKey) { window.location.href = '/admin/'; return; }

    try {
      const res = await fetch(getApiBase() + '/garage-requests/admin/dashboard-stats', {
        headers: { 'X-Admin-Key': adminKey }
      });
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();

      document.getElementById('statCustomers').textContent = d.total_customers ?? 0;
      document.getElementById('statGarages').textContent   = d.total_garages   ?? 0;
      document.getElementById('statRevenue').textContent   = fmtRevenue(d.monthly_revenue ?? 0);
      
      const allTimeStr = fmtRevenue(d.all_time_revenue ?? 0);
      document.getElementById('statAllTimeRevenue').textContent = `All Time: ${allTimeStr}`;

      const pending = d.pending_requests ?? 0;
      document.getElementById('statPending').textContent      = pending;
      document.getElementById('statPendingLabel').textContent = pending === 0 ? 'All clear' : 'Needs attention';

      // Pending approvals table
      const tbody = document.getElementById('pendingTableBody');
      if (!d.pending_list || d.pending_list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No pending requests</td></tr>';
      } else {
        tbody.innerHTML = d.pending_list.map(r => {
          const badge = STATUS_BADGE[r.status] || 'bg-secondary text-white';
          const label = r.status.replace(/_/g, ' ');
          return `<tr>
            <td><div class="fw-semibold">${r.name}</div><div class="text-muted small">${r.phone}</div></td>
            <td class="text-muted small">${r.location}</td>
            <td><span class="badge ${badge} text-capitalize">${label}</span></td>
            <td><a href="/admin/garages" class="btn btn-sm btn-outline-primary py-0 px-2">View</a></td>
          </tr>`;
        }).join('');
      }

      // SOS list
      const sosCont = document.getElementById('sosListContainer');
      if (!d.recent_sos || d.recent_sos.length === 0) {
        sosCont.innerHTML = '<div class="text-center text-muted py-4">No SOS alerts</div>';
      } else {
        sosCont.innerHTML = d.recent_sos.map(s => {
          const border = SOS_COLOR[s.status] || 'border-secondary';
          const statusLabel = s.status.replace(/_/g, ' ');
          const garage = s.garage_name ? `<div class="text-muted small">→ ${s.garage_name}</div>` : '';
          return `<div class="px-4 py-3 border-bottom border-start border-3 ${border} ms-0">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="fw-semibold">${s.customer}</div>
                <div class="text-muted small">${s.description}</div>
                <div class="text-muted small">${s.address}</div>
                ${garage}
              </div>
              <div class="text-end ms-2 flex-shrink-0">
                <span class="badge bg-secondary text-capitalize mb-1">${statusLabel}</span>
                <div class="text-muted" style="font-size:0.72rem;">${s.time_ago}</div>
                <a href="/admin/sos-monitor" class="btn btn-sm btn-outline-danger py-0 px-2 mt-1" style="font-size:0.72rem;">Track</a>
              </div>
            </div>
          </div>`;
        }).join('');
      }
    } catch (err) {
      console.error('Dashboard load failed:', err);
      document.getElementById('pendingTableBody').innerHTML =
        '<tr><td colspan="4" class="text-center text-danger py-4">Failed to load data</td></tr>';
      document.getElementById('sosListContainer').innerHTML =
        '<div class="text-center text-danger py-4">Failed to load data</div>';
    }
  }

  loadDashboardStats();
</script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live SOS Monitor - Admin | GarageNearMe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#DC2626">
  <link rel="stylesheet" href="/css/bootstrap.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Specific styles for the SOS Monitor to give a "Command Center" feel */
    body {
      background-color: #0F172A; /* Darker background for the radar page */
    }
    
    .admin-content {
      background-color: #0F172A;
      padding: 0; /* Remove padding to let map take full height */
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .admin-topbar {
      background-color: #1E293B;
      border-bottom: 1px solid #334155;
      color: white;
    }
    
    .admin-topbar .text-dark {
      color: white !important;
    }

    .sos-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Map Area */
    .sos-map-area {
      flex: 1;
      position: relative;
      background-color: #1a2235;
      background-image: 
        linear-gradient(rgba(30, 58, 138, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 58, 138, 0.2) 1px, transparent 1px);
      background-size: 40px 40px;
      overflow: hidden;
    }

    .map-overlay-stats {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .stat-pill {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 50px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Radar Ping Animation */
    .radar-ping {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #EF4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px #EF4444;
      cursor: pointer;
    }

    .radar-ping::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background-color: transparent;
      border: 2px solid #EF4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes ping {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
    }

    /* Active Garage Markers */
    .garage-marker {
      position: absolute;
      width: 14px;
      height: 14px;
      background-color: #10B981;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #0F172A;
    }

    /* Side Panel */
    .sos-sidebar {
      width: 400px;
      background-color: #1E293B;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sos-sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #334155;
      color: white;
    }

    .sos-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .sos-card {
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      transition: all 0.2s;
    }

    .sos-card:hover, .sos-card.active {
      border-color: #EF4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
    }

    .sos-card.assigned {
      border-left: 4px solid #F59E0B;
    }

    .sos-card.unassigned {
      border-left: 4px solid #EF4444;
    }

    .sos-card * {
      color: #cbd5e1;
    }

    .sos-card h6 {
      color: white;
    }

    /* Scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1E293B; 
    }
    ::-webkit-scrollbar-thumb {
      background: #475569; 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748B; 
    }

  </style>
</head>

<body>

  <div class="admin-layout">
    <div id="sidebar-container"></div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="admin-content">
      <div id="topbar-container"></div>

      <!-- Layout -->
      <div class="sos-layout">
        
        <!-- Radar Map Area -->
        <div class="sos-map-area position-relative">
          
          <div class="map-overlay-stats">
            <div class="stat-pill">
              <span class="text-white-50 small text-uppercase tracking-wider">Active SOS</span>
              <span class="fs-5 fw-bold text-danger" id="sosActiveCount">—</span>
            </div>
            <div class="stat-pill">
              <span class="text-white-50 small text-uppercase tracking-wider">Available Garages</span>
              <span class="fs-5 fw-bold text-success" id="sosAvailGarages">—</span>
            </div>
          </div>

          <!-- Radar Center Point (Simulated Admin Location / City Center) -->
          <div class="position-absolute top-50 start-50 translate-middle" style="width: 400px; height: 400px; border: 1px solid rgba(30, 58, 138, 0.3); border-radius: 50%;"></div>
          <div class="position-absolute top-50 start-50 translate-middle" style="width: 800px; height: 800px; border: 1px solid rgba(30, 58, 138, 0.2); border-radius: 50%;"></div>
          
          <div class="position-absolute top-50 start-50 translate-middle bg-primary rounded-circle shadow" style="width: 12px; height: 12px; border: 2px solid #0F172A;"></div>

          <!-- Dynamic SOS Pings (rendered by JS) -->
          <div id="sosPingsContainer"></div>

          <!-- Assignment Line Animation (Simulating a garage heading to an SOS) -->
          <svg class="position-absolute top-0 start-0 w-100 h-100" style="pointer-events: none;">
            <line x1="70%" y1="60%" x2="65%" y2="65%" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,5">
              <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
            </line>
          </svg>

        </div>

        <!-- Right Sidebar Data -->
        <div class="sos-sidebar">
          <div class="sos-sidebar-header">
            <h5 class="fw-bold mb-1" style="font-family: var(--font-head);">Active Emergencies</h5>
            <p class="text-white-50 small mb-0">Prioritize red items (Unassigned)</p>
          </div>
          
          <div class="sos-list" id="sosListPanel">
            <div class="text-center text-white-50 py-4">Loading...</div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="/js/components.js"></script>
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/config.js"></script>
  <script>
    initAdminChrome('Live SOS Command Center');
  </script>
  <script>
  const PIN_POSITIONS = [
    {top:'30%',left:'40%'},{top:'60%',left:'70%'},{top:'80%',left:'30%'},
    {top:'20%',left:'60%'},{top:'50%',left:'50%'},{top:'70%',left:'20%'},
    {top:'35%',left:'80%'},{top:'65%',left:'55%'},{top:'45%',left:'15%'},
    {top:'55%',left:'85%'},
  ];

  const STATUS_LABEL = {
    broadcasting: { cls: 'bg-danger', label: 'Broadcasting' },
    accepted:     { cls: 'bg-warning text-dark', label: 'Accepted' },
    on_the_way:   { cls: 'bg-info text-dark', label: 'On The Way' },
    in_progress:  { cls: 'bg-primary', label: 'In Progress' },
  };

  const SVG_PIN = `<svg viewBox="0 0 24 24" width="16" height="16" fill="#94A3B8" class="mt-1 flex-shrink-0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

  async function loadSOS() {
    const adminKey = localStorage.getItem('gnm_admin_key');
    if (!adminKey) { window.location.href = '/admin/'; return; }

    try {
      const res = await fetch(getApiBase() + '/sos/admin/active', {
        headers: { 'X-Admin-Key': adminKey }
      });
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();

      document.getElementById('sosActiveCount').textContent  = d.active_sos ?? 0;
      document.getElementById('sosAvailGarages').textContent = d.avail_garages ?? 0;

      // Radar pings
      const pingsCont = document.getElementById('sosPingsContainer');
      if (d.list && d.list.length > 0) {
        pingsCont.innerHTML = d.list.map((s, i) => {
          const pos = PIN_POSITIONS[i % PIN_POSITIONS.length];
          return `<div class="radar-ping" style="top:${pos.top};left:${pos.left};"></div>`;
        }).join('');
      } else {
        pingsCont.innerHTML = '';
      }

      // SOS list panel
      const panel = document.getElementById('sosListPanel');
      if (!d.list || d.list.length === 0) {
        panel.innerHTML = '<div class="text-center text-white-50 py-5"><div class="mb-2">✓</div>No active emergencies</div>';
        return;
      }

      panel.innerHTML = d.list.map((s, i) => {
        const st = STATUS_LABEL[s.status] || { cls: 'bg-secondary', label: s.status };
        const isUnassigned = s.status === 'broadcasting';
        const cardCls = isUnassigned ? 'unassigned' : 'assigned';
        const timeColor = isUnassigned ? 'text-danger' : 'text-white-50';
        const garageHtml = s.garage_name
          ? `<div class="p-2 bg-dark rounded border border-secondary border-opacity-50 small mt-2">
               <span class="text-white">Assigned:</span> ${s.garage_name}
             </div>`
          : (isUnassigned ? `<div class="d-flex gap-2 mt-3">
               <button class="btn btn-sm btn-danger flex-grow-1 fw-medium">Manual Assign</button>
             </div>` : '');
        return `<div class="sos-card ${cardCls}${i===0?' active':''}">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <span class="badge ${st.cls}">${st.label}</span>
            <span class="${timeColor} small fw-bold">${s.time_ago}</span>
          </div>
          <h6 class="mb-1">${s.description}</h6>
          <div class="small mb-2 text-white">${s.customer}${s.phone ? ' • ' + s.phone : ''}</div>
          <div class="small mb-1 text-white-50">${s.vehicle}</div>
          <div class="d-flex align-items-start gap-2 small">
            ${SVG_PIN}
            <span>${s.address}</span>
          </div>
          ${garageHtml}
        </div>`;
      }).join('');
    } catch (err) {
      console.error('SOS monitor load failed:', err);
      document.getElementById('sosListPanel').innerHTML =
        '<div class="text-center text-danger py-4">Failed to load SOS data</div>';
    }
  }

  loadSOS();
  setInterval(loadSOS, 15000); // auto-refresh every 15 seconds
  </script>
</body>

</html>
